chronic_respiratory_failure:
  disease_kr: 만성 호흡부전
  icd10:
  - J96.1
  - J96.10
  - J96.11
  - J96.12
  icd11: CA90.1
  icd9: '518.83'
  weights:
    symptoms: 0.2
    lab: 0.4
    radiology: 0.25
    micro: 0.15
  symptoms:
  - dyspnea
  - chronic cough
  - fatigue
  - peripheral edema
  - morning headache
  - cyanosis
  - weight loss
  hpo_symptom_map:
    dyspnea: HP:0002094
    chronic cough: HP:0031245
    fatigue: HP:0012378
    peripheral edema: HP:0000969
    morning headache: HP:0002315
    cyanosis: HP:0000961
    weight loss: HP:0001824
  lab_patterns:
  - Hypercapnia (respiratory acidosis)
  - Hypoxemia
  - Polycythemia
  - Erythrocytosis
  - Elevated Serum Bicarbonate (metabolic alkalosis or compensated respiratory acidosis)
  radiology_findings:
  - hyperinflation
  - emphysema
  - flattened diaphragm
  - fibrosis
  - interstitial
  - cardiomegaly
  - enlarged central pulmonary artery
  micro_findings: []
  references:
