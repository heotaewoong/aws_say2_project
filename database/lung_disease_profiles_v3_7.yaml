    PMID:14621112 (chronic + acute 종합 review; acute_respiratory_failure 와 동일 evidence
    base)'
  - '[2026-05-19 정정] PMID:18430680 (표기: Budweiser et al. Chronic respiratory failure)
    fabricated 적발 — 실제 Roth EJ "Executive summary" Top Stroke Rehabil 2008 (stroke
    rehab 무관). 60 entries hpo_phenotypes sources를 PMID:14621112 (Roussos 2003)로 일괄
    교체. evidence 일관성: acute_respiratory_failure 카테고리와 동일 PMID 인용'
  - '[v6+ 가중치 조정 2026-04-20] v6+: ABG/SpO2/PFT/RR 모두 L → L 대폭 상향. S에서 SpO2/PFT 제거
    → S 하향'
  - '[ICD-10-CM specific 메타] J96.10/J96.11/J96.12 (3건) — WHO ICD-10 base는 J96.1 (WHO
    base 4자리). ICD-CM 5-7자리는 임상 specificity (예: J96.01 hypoxic vs J96.02 hypercapnic
    치료 분리) 보존 위해 유지. 호환: MIMIC-IV (ICD-CM 표준) + KOSTAT KCD 8판 (2020) + 국내 EMR. 정책:
    lung_dx/ARCHITECTURE.md §ICD-10-CM specific 코드 정책 참조 (2026-05-19 결정)'
