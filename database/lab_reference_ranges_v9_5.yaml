223989:
  name: LLL Lung Sounds
  name_kr: 좌하엽 폐음
  unit: text
  category: D_Physical_Exam_Lung_Sounds
  ref_source: Bohadana et al. NEJM 2014;370:744-751; Bates' 13th Ed (Bickley 2021);
    Harrison's 21st/22nd (2026) Ch.284
  type: categorical
  values:
  - Clear
  - Diminished
  - Absent
  - Crackles
  - Rhonchi
  - Wheezes
  - Bronchial
  clinical_significance:
    Clear: 정상 vesicular 호흡음
    Diminished: 폐음 감소 — 좌측 흉수(하부 저류), 좌측 기흉, 좌하엽 무기폐, 비만, COPD 과팽창 [Bates' 13th]
    Absent: 폐음 소실 — 대량 좌측 기흉, 대량 좌측 흉수, 완전 좌하엽 무기폐 [Harrison's 21st]
    Crackles: '수포음 — (1) Fine: IPF/ILD 양측 기저부 velcro crackles, 초기 폐부종 [NEJM 2014];
      (2) Coarse: 흡인성 폐렴(RLL 다음으로 LLL 호발), 세균성 폐렴, 기관지확장증 [Harrison''s 21st]'
    Rhonchi: 저음 연속음 — 기도 분비물(COPD, 기관지확장증); 기침 후 소실 또는 변화 [NEJM 2014; ERS 2000]
    Wheezes: 고음 연속음 — 천식, COPD; LLL 국소 wheezes 시 좌하엽 기관지 종양/이물 감별 [Forgacs, Chest
      1978]
    Bronchial: 기관지성 호흡음 — consolidation(대엽성 폐렴), 좌하엽 무기폐 인접 부위 [NEJM 2014]
  note: LLL은 RLL과 함께 중력 의존 부위로서 흡인성 폐렴, 흉수, 폐부종의 초기 이상이 나타나는 부위. 단, 해부학적으로 좌주기관지가
    우측보다 길고(5cm vs 2.5cm) 각도가 완만하여(45° vs 25°) 흡인 빈도는 RLL보다 낮음 [Harrison's 21st Ch.257;
    Murray & Nadel 7th]. 좌측 하부 청진 시 심장 인접에 의한 cardiac artifact 주의 — 심첨부 인접으로 심음이 폐음과
    중첩될 수 있음 [Bates' 13th].
