# ============================================================
# HAPI FHIR JPA Server - Docker Compose Configuration
# 
# Runs HAPI FHIR v7.4.0 connected to Aurora PostgreSQL 16.4
# (patient-db-cluster). Database password is retrieved at
# container startup from AWS Secrets Manager via entrypoint.sh.
#
# Deploy to: fhir-ec2 (15.164.21.221)
# ============================================================

services:
  hapi-fhir:
    image: hapiproject/hapi:v7.4.0
    container_name: hapi-fhir
    ports:
      - "8080:8080"
    environment:
      # --- PostgreSQL Datasource ---
      SPRING_DATASOURCE_URL: "jdbc:postgresql://patient-db-cluster.cluster-cxmiyawwwhbt.ap-northeast-2.rds.amazonaws.com:5432/rarelink?currentSchema=hapi"
      SPRING_DATASOURCE_USERNAME: "hapi_user"
      SPRING_DATASOURCE_PASSWORD: "${SPRING_DATASOURCE_PASSWORD}"
      SPRING_DATASOURCE_DRIVERCLASSNAME: "org.postgresql.Driver"
      SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT: "ca.uhn.fhir.jpa.model.dialect.HapiFhirPostgresDialect"
      SPRING_JPA_PROPERTIES_HIBERNATE_DEFAULT_SCHEMA: "hapi"

      # HikariCP uses Spring Boot defaults (pool size 10, 30s timeout)
      # Do NOT set hikari properties via env vars - causes "pool sealed" error

    # --- Health Check ---
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/fhir/metadata"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

    # --- Restart Policy ---
    restart: unless-stopped
