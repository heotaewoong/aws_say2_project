metadata:
  version: v1.6
  date: '2026-05-18'
  prior_versions:
    - 'v1   (2026-05-14) — backup: chexpert_label_reference_v1.pre_verify_backup.yaml'
    - 'v1.1 (2026-05-15) — first verification audit; [V]/[P]/[F] marker introduction'
    - 'v1.2 (2026-05-15) — Fleischner 2024 PMC HTML 532KB grep, fact violation 5건 + verbatim 11건. backup: chexpert_label_reference_v1.pre_v1_3_backup.yaml'
    - 'v1.3 (2026-05-18) — arXiv 1901.07031 PDF grep, "compositional" 0 hits 적발, Pneumonia evidence verbatim 정정, fact 위반 누적 9건. backup: chexpert_label_reference_v1.pre_v1_4_backup.yaml'
    - 'v1.4 (2026-05-18) — 헤더 전면 보강(파일 역할 SSOT 명시 + [V]/[P]/[F] 마커 정의·필요성·의사결정 흐름·누적 상태표 + 소비자 명시 + purpose 보강). documentation only. backup: chexpert_label_reference_v1.pre_v1_5_backup.yaml'
    - 'v1.5 (2026-05-18) — 약어·용어 풀이 글로서리 신설(40+ 약어 4 그룹 분류: 시스템/의학영상/학술문헌/AI · full term + 한글 + 정의 + 사용맥락). documentation only. backup: chexpert_label_reference_v1.pre_v1_6_backup.yaml'
  purpose: |
    Phase 2 (CheXpert 14 라벨) ↔ Phase 3 (질환 profile radiology_findings
    Fleischner descriptor) 어댑터 매핑 SSOT.
    각 expansion 토큰에 [V]/[P]/[F] 학술 evidence 마커 부착.
    HPO 변환 없음 (Option E). chest X-ray CR/DX only.
    상세: 본 파일 상단 헤더의 "▣ 파일 역할" + "▣ Evidence 마커 체계" 참조.
  owner: lung_dx
  scope: chest X-ray (CR/DX) only. CT/MRI 미적용.

# ── 14 라벨 매핑 ─────────────────────────────────────────────────
labels:
  Atelectasis:
    canonical_db_token: atelectasis
    expansion:
      - atelectasis
      - volume loss
      - opacity
      
    evidence:
      - '[V] R1 Fleischner 2024 §Atelectasis (Pathology) [PMC10902601 본문 verbatim]: "Atelectasis is a partial or complete collapse of the lung."'
      - '[V] R1 Fleischner 2024 §Opacity (Anatomy/Pathology) [Descriptor] verbatim: "Opacity refers to any focal or diffuse nonspecific area of increased attenuation."'
      - '[F] (v1.6 정정) v1.5 표현 "Table 1: included observation; §4.2 5-label radiologist-benchmark 포함": arXiv 1901.07031 PDF 본문 grep 결과 "§4.2" 0 hits / "5-label" 0 hits / "radiologist-benchmark" 0 hits. lung_dx 내부 paraphrase 였음. 아래 verbatim 으로 대체.'
      - '[V] R2 CheXpert paper "Comparison to Radiologists" table 헤더 verbatim: "Atelectasis Cardiomegaly Consolidation Edema Pleural Effusion" — Atelectasis 는 5 selected pathologies 중 하나 (Test set 500 studies, consensus of 5 board-certified radiologists ground truth).'
      - '[P] "volume loss" 토큰: 영상의학 임상 통용 secondary descriptor. Fleischner 2024 §Atelectasis 본문 내 "loss of negative pressure in the pleural space" 표현 있으나 "volume loss" verbatim entry 미확보.'

  Cardiomegaly:
    canonical_db_token: cardiomegaly
    expansion:
      - cardiomegaly
    evidence:
      - '[F] (v1.6 정정) v1.5 표현 "Table 1 + §4.2: 5-label radiologist-benchmark 포함 (verbatim 확보)": arXiv 1901.07031 PDF 본문 grep "§4.2"·"5-label" 0 hits, lung_dx paraphrase. 아래 verbatim 으로 대체.'
      - '[V] R2 CheXpert paper Abstract verbatim: "On Cardiomegaly, Edema, and Pleural Effusion, the model ROC and PR curves lie above all 3 radiologist operating points." — Cardiomegaly 는 abstract 에서 우수 결과 명시적 그룹.'
      - '[V] R2 CheXpert paper "Comparison to Radiologists" table 헤더 verbatim: 5 selected pathologies 중 하나 ("Atelectasis Cardiomegaly Consolidation Edema Pleural Effusion").'
      - '[F] (제거) R1 Fleischner 2024 "cardiothoracic ratio ≥0.5 on PA projection": 2026-05-15 PMC10902601 본문 raw HTML grep 결과 "Cardiomegaly" 0 hits, "cardiothoracic" 2 hits (둘 다 reference 인용 — Radiol Cardiothorac Imaging 저널명). Fleischner 2024 Glossary에 Cardiomegaly entry 부재. cardiothoracic ratio ≥0.5 threshold는 영상의학 임상 통용이나 Fleischner 본문에 부재 — R1 attribute 제거.'
      - '[P] cardiothoracic ratio ≥0.5 threshold 1차 출처: 영상의학 textbook (Felson · Brant & Helms) — primary academic source verbatim pending.'

  Consolidation:
    canonical_db_token: consolidation
    expansion:
      - consolidation
      - airspace disease
      - air bronchogram
    evidence:
      - '[V] R1 Fleischner 2024 §Consolidation (Pathology) [Descriptor] verbatim: "Consolidation refers to the increased attenuation of lung parenchyma resulting from evacuation of air from the alveoli, and its replacement by fluid or other material."'
      - '[V] R1 Fleischner 2024 §Air Bronchogram (Pathology) [Descriptor] verbatim: "Air bronchogram is the descriptive term for air-filled airways within lung parenchyma that is partially or completely airless."'
      - '[V] R1 Fleischner 2024 §Airspace (Anatomy) verbatim: "An airspace is the air- or gas-containing part of the lung parenchyma, including the respiratory bronchioles, alveolar ducts, and alveoli, but excluding purely conductive airways such as terminal bronchioles."'
      - '[F] (다운그레이드) "airspace disease" 토큰: Fleischner 2024 본문에 "airspace" + "air space nodules"는 있으나 "airspace disease" 자체 verbatim 부재. 임상 통용으로 유지하되 R1 attribute 제거.'
      - '[F] (v1.6 정정) v1.5 표현 "included in 5-label benchmark": arXiv 1901.07031 PDF 본문에 "5-label benchmark" verbatim 부재. 아래 verbatim 으로 대체.'
      - '[V] R2 CheXpert paper "Comparison to Radiologists" table 헤더 verbatim: "Atelectasis Cardiomegaly Consolidation Edema Pleural Effusion" — Consolidation 은 5 selected pathologies 중 하나.'

  Edema:
    canonical_db_token: pulmonary edema
    expansion:
      - pulmonary edema
      - interstitial
      - septal thickening
      - peribronchial thickening
      - kerley
      - vascular congestion
      - cephalization
      - pleural effusion
    evidence:
      - '[V] R1 Fleischner 2024 §Septal lines (Pathology) verbatim: "isolated septal lines can be occasionally seen on CT examinations in otherwise healthy patients in the lung apices and the bases as thin linear structures separating secondary pulmonary lobules. They are more conspicuous when thickened (eg, in interstitial pulmonary edema)."'
      - '[V] R1 Fleischner 2024 §Septal thickening (figure description) verbatim: "Septal thickening: Frontal chest radiograph shows septal lines (arrow). Formerly referred to as Kerley lines on radiographs, an obsolete and nonrecommended term, they reflect the accumulation of fluid or tumor in the interstitial space."'
      - '[V] R1 Fleischner 2024 §Septal lines verbatim: "formerly called Kerley B lines" — 즉 Fleischner는 Kerley를 obsolete 용어로 분류, septal lines 권장.'
      - '[F] (제거) R4 Komiya 2017 SR: 본문에서 Kerley lines/septal thickening/peribronchial cuffing/vascular congestion/cephalization 5개 토큰 모두 verbatim 부재 (PMC6389074 full text 검증). BNP biomarker + ultrasound B-lines + CT 중심 SR — R4 attribute 제거.'
      - '[P] "peribronchial thickening" · "vascular congestion" · "cephalization" 토큰: Fleischner 2024 §Septal lines context와 영상의학 textbook 통용. R5 Gluecker 1999 RadioGraphics paper (RSNA paywall 미확보)에서 1차 출처 verbatim 확보 예정.'
      - '[F] (v1.6 정정) v1.5 표현 "5-label benchmark 포함": "5-label benchmark" verbatim 부재. 아래 verbatim 으로 대체.'
      - '[V] R2 CheXpert paper Abstract verbatim: "On Cardiomegaly, Edema, and Pleural Effusion, the model ROC and PR curves lie above all 3 radiologist operating points." — Edema 는 abstract 우수 결과 그룹.'
      - '[V] R2 CheXpert paper "Comparison to Radiologists" table 헤더: 5 selected pathologies 중 하나.'

  Enlarged Cardiomediastinum:
    canonical_db_token: mediastinal widening
    expansion:
      - mediastinal widening
      - lymphadenopathy
      - cardiomegaly
    evidence:
      - '[V] R1 Fleischner 2024 §Lymphadenopathy (Pathology) verbatim: "Lymphadenopathy refers to any pathologic transformation of lymph nodes with regard to size, shape, and morphology. In more common usage, the term refers to the abnormal enlargement of lymph nodes."'
      - '[F] (v1.6 정정) v1.5 표현 "Table 1: cardiac silhouette enlargement OR mediastinal widening 묶음 라벨 (verbatim 확보)": arXiv 1901.07031 PDF 본문 grep "widening" 0 hits / "cardiomediastinum" 0 hits / "cardiac silhouette" 0 hits. lung_dx paraphrase. 본문 verbatim 은 "unremarkable cardiomediastinal silhouette" (1 hit, observation 예시) 뿐.'
      - '[V] R2 CheXpert paper Table 헤더 verbatim: "Enlarged Cardiom." (페이지 너비 제약으로 축약된 14 observations 중 하나). 5 selected pathologies 미포함.'
      - '[F] (제거) R1 Fleischner 2024 "mediastinal widening 정의 (>6-8cm on supine AP CXR)": 2026-05-15 PMC10902601 본문 raw HTML grep 결과 "mediastinal widening" 0 hits. "mediastinal" 단어 자체는 51 hits이나 "mediastinal widening"으로 결합 entry 부재. R1 attribute 제거.'
      - '[P] mediastinal widening >6-8cm threshold 1차 출처: 영상의학 임상 통용 — primary academic source verbatim pending.'

  Fracture:
    canonical_db_token: ''
    expansion: []
    evidence:
      - '[V] R2 CheXpert paper Table 1: rib/clavicle/vertebral fracture 포함 묶음'
    out_of_scope: true

  Lung Lesion:
    canonical_db_token: nodule
    expansion:
      - nodule
      - mass
      - lesion
      - tumor
      - malignancy
      - cavity
      - cavitation
    evidence:
      - '[V] R1 Fleischner 2024 §Nodule (Pathology) verbatim: "A micronodule is a circumscribed and typically round opacity, previously defined as less than 3 mm, but currently defined as less than 6 mm in average diameter."'
      - '[V] R1 Fleischner 2024 §Mass (Pathology) verbatim: "A mass is any circumscribed lesion greater than 30 mm in diameter. The term usually refers to a predominantly solid soft tissue structure but cavitary, cystic, or calcified components may be present to various degrees."'
      - '[V] R1 Fleischner 2024 §Cavity (Pathology) verbatim: "A cavity is an abnormal gas- or fluid-filled structure with a typically thick and often irregular wall, usually produced by the expulsion or drainage of a necrotic part of the lesion via the bronchial tree."'
      - '[F] (다운그레이드) "cavitation" 토큰: Fleischner 2024 본문에 별도 Cavitation entry 없음. Cavity entry 내부에 "rather than cavitation" 표현 1회만. 임상 통용으로 유지하되 별도 entry attribute 제거.'
      - '[P] R6 Fleischner 2017 Incidental Pulmonary Nodules guideline (PMID 28240562): RSNA paywall 403 — 본 시점 verbatim 미확보.'
      - '[V] R2 CheXpert paper: focal lung lesion (nodule + mass + cavity 묶음)'

  Lung Opacity:
    canonical_db_token: opacity
    expansion:
      - opacity
      - infiltrate
      - ground glass
      - consolidation
      - reticular
    evidence:
      - '[V] R1 Fleischner 2024 §Opacity (Anatomy/Pathology) [Descriptor] verbatim: "Opacity refers to any focal or diffuse nonspecific area of increased attenuation. The term is a general descriptor that does not indicate the nature of the condition causing the opacity. The term has sometimes been used synonymously with the now obsolete and nonrecommended term \"infiltrate\"."'
      - '[V] R1 Fleischner 2024 §Ground-glass opacity (Physiology/Pathology) verbatim: "Ground-glass refers to an area of increased attenuation that does not completely obscure the underlying bronchial and vascular [structures]."'
      - '[F] (v1.6 정정) v1.5 표현 "Table 1: catch-all radiologic abnormality (verbatim 확보)": arXiv 1901.07031 PDF 본문 grep "catch-all" 0 hits / "radiologic abnormality" 0 hits. lung_dx paraphrase.'
      - '[V] R2 CheXpert paper Table 헤더 verbatim: "Lung Opacity" — 14 observations 중 하나로 등장. 5 selected pathologies 미포함.'
      - '[!] 정직성 명시: "infiltrate" 토큰은 Fleischner 2024가 명시적으로 "obsolete and nonrecommended" 으로 분류. lung_dx는 임상 통용 유지 + Phase 3 매칭에서만 사용 (영상의학 보고서에 흔히 등장).'
      - '[P] (v1.6 추가) R10 Fleischner ILD 2025 Consensus (Ryerson CJ et al. AJRCCM 2025;211(10):1756-1774, PMID 40758555): interstitial lung disease 표준 용어·정의 consensus. "reticular" / "ground glass" / "honeycombing" 등 ILD 영상 descriptor 의 보강 reference (R1 Fleischner 2024 main glossary 외 ILD 전용). 본 시점 full text 미접근 — verbatim [P] pending.'

  No Finding:
    canonical_db_token: ''
    expansion: []
    evidence:
      - '[V] R2 CheXpert paper Table 1: 정상 또는 abnormality 없음'
    out_of_scope: true

  Pleural Effusion:
    canonical_db_token: pleural effusion
    expansion:
      - pleural effusion
      - effusion
    evidence:
      - '[F] (v1.6 정정) v1.5 표현 "5-label benchmark 포함 (verbatim 확보)": "5-label benchmark" verbatim 부재. 아래 verbatim 으로 대체.'
      - '[V] R2 CheXpert paper Abstract verbatim: "On Cardiomegaly, Edema, and Pleural Effusion, the model ROC and PR curves lie above all 3 radiologist operating points." — Pleural Effusion 은 abstract 우수 결과 그룹.'
