AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  Phase 3 — Multimodal Weighted Scoring (lung diagnostic v2 pipeline).
  Lambda + Layers (data + deps) + API Gateway REST.

Parameters:
  Stage:
    Type: String
    AllowedValues: [dev, staging, prod]
    Default: dev
  LogRetentionDays:
    Type: Number
    Default: 90

Globals:
  Function:
    Runtime: python3.11
    Timeout: 300
    Tracing: Active
    Environment:
      Variables:
        STAGE: !Ref Stage
        DATA_DIR: /opt/data
        PYTHONPATH: /opt/python
        LUNG_DX_DATA_DIR: /opt/data

Resources:
  # ── Layer: 528-disease registry data (YAML + Excel) ────────────
  Phase3DataLayer:
    Type: AWS::Serverless::LayerVersion
    Properties:
      LayerName: !Sub phase3-data-${Stage}
      Description: Disease registry YAML + Excel (528 diseases)
      ContentUri: ./layer/data-build/
      CompatibleRuntimes: [python3.11]
      RetentionPolicy: Retain

  # ── Layer: lung_dx Python code + deps (PyYAML, openpyxl, …) ────
  Phase3DepsLayer:
    Type: AWS::Serverless::LayerVersion
    Properties:
      LayerName: !Sub phase3-deps-${Stage}
      Description: lung_dx package + Python dependencies
      ContentUri: ./layer/deps-build/
      CompatibleRuntimes: [python3.11]
      RetentionPolicy: Retain

  # ── Lambda: scoring handler ──────────────────────────────────────
  Phase3ScorerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub phase3-scorer-${Stage}
      CodeUri: ./lambda/
      Handler: handler.lambda_handler
      MemorySize: 2048
      ReservedConcurrentExecutions: 5
      Layers:
        - !Ref Phase3DataLayer
        - !Ref Phase3DepsLayer
      Events:
        ApiPost:
          Type: Api
          Properties:
            RestApiId: !Ref Phase3Api
            Path: /score
            Method: POST
        ApiHealth:
          Type: Api
          Properties:
            RestApiId: !Ref Phase3Api
            Path: /health
            Method: GET
      # VPC config — RDS 사설 IP (10.0.0.54) 접근 위해 VPC 내부 배치
      VpcConfig:
        SecurityGroupIds:
          - sg-03b9bc5d95699b797   # fhir-ec2-sg — RDS 5432 ingress 허용된 유일 SG
        SubnetIds:
          - subnet-02eed659772bac6aa   # private-1 (AZ 2a)
          - subnet-09ba10cf625d73da0   # private-4 (AZ 2c) — multi-AZ HA
      # Lambda execution role: 기본 Lambda 실행 + X-Ray + CloudWatch Logs
      # + VPC 접근 (ENI 생성) + Secrets Manager (Aurora 비밀번호)
      Policies:
        - AWSLambdaBasicExecutionRole
        - AWSLambdaVPCAccessExecutionRole
        - AWSXrayWriteOnlyAccess
        # Secrets Manager — Aurora credentials (Phase 5와 동일 패턴)
        - Statement:
            - Effect: Allow
              Action:
                - secretsmanager:GetSecretValue
              Resource:
                - !Sub "arn:aws:secretsmanager:ap-northeast-2:*:secret:soopul/aurora/app-user*"

  # ── API Gateway REST ─────────────────────────────────────────────
  Phase3Api:
    Type: AWS::Serverless::Api
    Properties:
      Name: !Sub phase3-api-${Stage}
      StageName: !Ref Stage
      TracingEnabled: true
      EndpointConfiguration:
        Type: REGIONAL
      MethodSettings:
        - ResourcePath: /*
          HttpMethod: '*'
          LoggingLevel: ERROR
          MetricsEnabled: true
          ThrottlingBurstLimit: 100
          ThrottlingRateLimit: 50

  # ── CloudWatch Log Group (명시적 retention) ──────────────────────
  Phase3ScorerLogs:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${Phase3ScorerFunction}
      RetentionInDays: !Ref LogRetentionDays

  # ── 알람: 5xx 에러 ───────────────────────────────────────────────
  Phase3ErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub phase3-errors-${Stage}
      AlarmDescription: Phase 3 Lambda error rate threshold
      MetricName: Errors
      Namespace: AWS/Lambda
      Dimensions:
        - Name: FunctionName
          Value: !Ref Phase3ScorerFunction
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 5
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching

  # ── 알람: p99 duration ───────────────────────────────────────────
  Phase3LatencyAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub phase3-latency-${Stage}
      AlarmDescription: Phase 3 p99 duration > 5s
      MetricName: Duration
      Namespace: AWS/Lambda
      Dimensions:
        - Name: FunctionName
          Value: !Ref Phase3ScorerFunction
      ExtendedStatistic: p99
      Period: 300
      EvaluationPeriods: 2
      Threshold: 5000
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching

Outputs:
  ApiEndpoint:
    Description: REST API endpoint
    Value: !Sub https://${Phase3Api}.execute-api.${AWS::Region}.amazonaws.com/${Stage}
  ScoreUrl:
    Description: POST endpoint for scoring
    Value: !Sub https://${Phase3Api}.execute-api.${AWS::Region}.amazonaws.com/${Stage}/score
  LambdaArn:
    Description: Lambda ARN (Step Functions integration용)
    Value: !GetAtt Phase3ScorerFunction.Arn
