    - J15
    - J18
    pattern: Crackles, Bronchial (좌하엽 대엽성 폐렴; 하엽은 CAP에서 가장 흔한 침범 부위) [Harrison's 21st;
      ATS/IDSA 2019 + ATS CAP 2025]
  - disease_key: hospital_acquired_pneumonia
