  clinical_significance:
    Clear: 정상 vesicular 호흡음
    Diminished: 폐음 감소 — 좌측 기흉, 좌측 상부 흉수(드묾), 좌상엽 무기폐, 비만, COPD 과팽창 [Bates' 13th]
    Absent: 폐음 소실 — 대량 좌측 기흉, 좌상엽 완전 무기폐 [Harrison's 21st]
    Crackles: '수포음 — (1) Fine: 사르코이드증(Stage IV), 진폐증(상엽 섬유화) [Murray & Nadel 7th];
      (2) Coarse: 폐결핵(상엽 첨후분절 공동/침윤), 세균성 폐렴 [Harrison''s 21st]'
    Rhonchi: 저음 연속음 — 기도 분비물(COPD, 기관지확장증); 좌상엽 기관지 종양 시 국소적 [NEJM 2014]
    Wheezes: 고음 연속음 — 천식, COPD; LUL 국소 wheezes 시 좌상엽 기관지 내 종양/이물 감별 [Forgacs, Chest
      1978]
    Bronchial: 기관지성 호흡음 — consolidation(폐렴, 폐결핵 공동 주변), ���상엽 무기폐 인접 부위 [NEJM 2014]
  note: LUL에는 해부학적으로 Lingula(좌설엽)가 포함되며 이는 우중엽(RML)에 대응하는 구조. Lingula 병변은 좌상엽 청진 영역에서
    포착됨 [Bates' 13th]. 좌상엽은 우상엽(RUL)과 함께 폐결핵, 진폐증, 사르코이드증의 상엽 우세 병변 평가에 핵심. 단, 좌측
    심장 인접으로 심음 간섭이 있을 수 있으며 전흉부 청진 시 주의 필요 [Bates' 13th].
