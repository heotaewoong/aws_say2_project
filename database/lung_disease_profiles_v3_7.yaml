  lab_patterns:
  - Leukocytosis
  - Neutrophilia
  - Elevated CRP (inflammation)
  - Elevated PCT (bacterial infection likely)
  - Elevated LDH (tissue damage/hemolysis)
  - Hypoxemia
  - Hyperlactatemia
  radiology_findings:
  - consolidation
  - infiltrate
  - air bronchogram
  - opacity
  - airspace disease
  - bulging fissure sign
  - cavitation
  - multilobar
  - pleural effusion
  micro_findings:
  - Streptococcus pneumoniae
  - Haemophilus influenzae
  - Moraxella catarrhalis
  - Staphylococcus aureus
  - Mycoplasma pneumoniae
  - Chlamydia pneumoniae
  - Legionella pneumophila
  references:
  - ATS/IDSA CAP Guidelines 2019 (Metlay JP et al. AJRCCM)
