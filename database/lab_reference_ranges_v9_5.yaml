    criterion: ≥10
    source: Zahorec R. Bratisl Lek Listy 2001
    note: 중증 패혈증/패혈성 쇼크 시사
  medical_terms:
    low: Normal (정상 면역 균형)
    high: Elevated NLR (전신 염증/면역 억제/불량 예후 지표)
    critical_high: Markedly Elevated NLR ≥10 (중증 패혈증/전신 염증)
  loinc: 770-8 / 736-9 (구성요소)
  note: NLR = Absolute Neutrophil Count / Absolute Lymphocyte Count (또는 %비율). 단순하지만
    강력한 예후 인자. COVID-19, NSCLC, 패혈증 등에서 독립적 예후 예측력 입증. MIMIC-IV에서 CBC differential로부터
    산출 가능.
  disease_associations:
