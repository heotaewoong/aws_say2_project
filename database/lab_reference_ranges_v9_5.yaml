    icd10_main:
    - J15.0
    - J15.1
    - J15.5
    - J15.6
    - J95.851
    pattern: Crackles, Bronchial (HAP/VAP에서 하엽 침범 흔함; 앙와위 장기 환자) [ATS/IDSA 2016]
  - disease_key: aspiration_pneumonia
