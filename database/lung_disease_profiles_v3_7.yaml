    change: S:0.25→0.30, L:0.35→0.40, R:0.25→0.10, M:0.15→0.20
    reason: 'GOLD 2026 Report v1.3 (released 2025-12-08), p.46: "A chest X-ray is

      not useful to establish a diagnosis in COPD, but it is valuable in

      excluding alternative diagnoses." 따라서 R축은 진단 1차 도구 아님 —

      0.25 → 0.10 하향. Anthonisen criteria (PMID 3492164: increased

      dyspnea, sputum volume, sputum purulence 3 cardinal symptoms) 기반

      S축 상향. ABG/CRP/FEV1/procalcitonin 등 L축 보강 (GOLD 2026 진단·

      중증도 핵심). 화농성 객담 시 sputum culture/PCR 의의 (GOLD 2026

      Table 4.4 antibiotic indication) → M축 0.15 → 0.20.

      '
