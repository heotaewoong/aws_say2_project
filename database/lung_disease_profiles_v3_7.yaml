  - '[v6+ 가중치 조정 2026-04-20] v6+: PEEP/FiO2/compliance/RR이 L에 포함, ICU 환경 모니터링 핵심 →
    L 상향, S 하향'
  - '[ICD-10-CM specific 메타] J95.851 (1건) — WHO ICD-10 base는 J95.8 (WHO base 4자리).
    ICD-CM 5-7자리는 임상 specificity (예: J96.01 hypoxic vs J96.02 hypercapnic 치료 분리) 보존
    위해 유지. 호환: MIMIC-IV (ICD-CM 표준) + KOSTAT KCD 8판 (2020) + 국내 EMR. 정책: lung_dx/ARCHITECTURE.md
    §ICD-10-CM specific 코드 정책 참조 (2026-05-19 결정)'
