EXT_PFT08:
  name: 6MWD (Six Minute Walk Distance)
  name_kr: 6분 보행 거리
  unit: meters
  category: R_Pulmonary_Function_Test
  ref_source: ATS 2002 6MWT Statement (Am J Respir Crit Care Med. 2002;166:111); ERS/ATS
    2014 Field Walking Tests (Holland AE et al. Eur Respir J. 2014;44:1428); ATS/ERS
    IPF 2022; ESC/ERS PAH 2022
  ranges:
    lower: 400
    upper: 700
  critical:
    low: 165
    high: null
  thresholds:
  - name: ipf_poor_prognosis
    criterion: <250 m
    source: Lederer DJ et al. Am J Respir Crit Care Med 2006
  - name: pah_poor_prognosis
    criterion: <165 m
    source: Miyamoto S et al. Am J Respir Crit Care Med 2000
  - name: mcid_copd
    criterion: 25-35 m increase = minimal clinically important difference
    source: Holland AE et al. ERS/ATS 2014
  - name: mcid_ipf
    criterion: 24-45 m decrease = clinically meaningful decline
    source: du Bois RM et al. Am J Respir Crit Care Med 2011
  medical_terms:
    low: Reduced exercise capacity
    critical_low: Severely reduced exercise capacity
  loinc: 64098-7
  mimic_iv_itemid: null
  mimic_iv_available: false
  measurement_context:
    environment: pulmonary_function_test
    specimen: null
    subtype: exercise_field_test
    patient_state_required: 30m straight corridor; standardized encouragement; continuous
      SpO2 monitoring
    notes: 'Desaturation ≥4% or nadir <88% during walk = exercise-induced hypoxemia,
      LTOT indication for ILD/COPD. Predicted distance equations: Enright PL Am J
      Respir Crit Care Med 1998; Troosters T Eur Respir J 1999.'
  lung_disease_diagnostic_value:
    primary_utility:
    - interstitial_lung_disease
    - pulmonary_hypertension
    - copd_exacerbation
    - chronic_respiratory_failure
    diagnostic_weight_hint: high
    cutoffs_for_dx:
    - disease_key: interstitial_lung_disease
      threshold: <250 m = poor prognosis in IPF; nadir SpO2 <88% = LTOT indication
      source: Lederer AJRCCM 2006; ATS/ERS IPF 2022
    - disease_key: pulmonary_hypertension
      threshold: <165 m = severe exercise impairment, WHO FC IV
      source: Miyamoto AJRCCM 2000; ESC/ERS PAH 2022
  disease_associations:
  - disease_key: interstitial_lung_disease
    disease_kr: 간질성 폐질환/IPF
    icd10_main:
    - J84.1
    - J84.10
    - J84.112
    - J84.9
    pattern: ↓ (<250 m → 불량 예후; nadir SpO2 <88% 시 LTOT 적응) [ATS/ERS IPF 2022]
  - disease_key: pulmonary_hypertension
    disease_kr: 폐동맥 고혈압
    icd10_main:
    - I27.0
    - I27.20
    - I27.29
    - I27.9
    pattern: ↓ (<165 m → WHO FC IV; 치료 반응 지표) [ESC/ERS PAH 2022]
  - disease_key: copd_exacerbation
    disease_kr: COPD
    icd10_main:
    - J44.0
    - J44.1
    - J44.9
    pattern: ↓ (BODE index 구성요소; 재활 효과 평가) [Celli BR NEJM 2004]
  - disease_key: chronic_respiratory_failure
    disease_kr: 만성 호흡부전
    icd10_main:
    - J96.1
    - J96.10
    pattern: ↓ (LTOT titration; desaturation 평가) [Harrison's 22nd Ch.318]
  hpo_terms:
    low: HP:0003546
EXT_PFT09:
  name: MIP (Maximum Inspiratory Pressure)
  name_kr: 최대흡기압
  unit: cmH2O
  category: R_Pulmonary_Function_Test
  ref_source: ATS/ERS 2002 Respiratory Muscle Testing (Am J Respir Crit Care Med.
    2002;166:518)
  ranges:
    lower: 80
    upper: 150
  critical:
    low: 30
    high: null
  thresholds:
  - name: normal_men
    criterion: '>80 cmH2O (or > -80 depending on convention)'
    source: ATS/ERS 2002
  - name: normal_women
    criterion: '>70 cmH2O'
    source: ATS/ERS 2002
  - name: diaphragm_weakness
    criterion: <60 cmH2O
    source: ATS/ERS 2002
  - name: ventilatory_failure_risk
    criterion: <30 cmH2O (NMD weaning criterion)
    source: Bach JR Chest 1993
  medical_terms:
    low: Inspiratory muscle weakness
    critical_low: Severe diaphragm/inspiratory muscle weakness
  loinc: 19868-9
  mimic_iv_itemid: null
  mimic_iv_available: false
  measurement_context:
    environment: pulmonary_function_test
    specimen: null
    subtype: respiratory_muscle_strength
    patient_state_required: effort from RV (maximum expiration) held for ≥1.5 seconds;
      at least 3 maneuvers
    notes: 'Sign convention varies: some labs report negative values (suction pressure).
      Low MIP suggests diaphragm/neuromuscular disease. Sniff nasal inspiratory pressure
      (SNIP) alternative.'
  lung_disease_diagnostic_value:
    primary_utility:
    - neuromuscular_respiratory_disease
    - chronic_respiratory_failure
    diagnostic_weight_hint: high
    cutoffs_for_dx:
    - disease_key: neuromuscular_disease
      threshold: MIP <60 cmH2O = weakness; <30 cmH2O = ventilatory failure risk
      source: ATS/ERS 2002; Bach Chest 1993
  disease_associations:
  - disease_key: neuromuscular_respiratory_disease
    disease_kr: 신경근육성 호흡 장애 (ALS, MG, 근이영양증 등)
    icd10_main:
    - G12.20
    - G12.21
    - G70.00
    - G71.2
    pattern: ↓ (<60 cmH2O → 근력 약화; <30 → 호흡부전 임박) [ATS/ERS 2002]
  - disease_key: chronic_respiratory_failure
    disease_kr: 만성 호흡부전
    pattern: ↓ (weaning 실패 예측) [Harrison's 22nd Ch.318]
  - disease_key: copd_exacerbation
    disease_kr: COPD
    icd10_main:
    - J44.0
    - J44.1
    - J44.9
    pattern: ↓ (hyperinflation에 의한 횡격막 기계적 불리) [GOLD 2026]
  hpo_terms:
    low: HP:0002747
EXT_PFT10:
  name: MEP (Maximum Expiratory Pressure)
  name_kr: 최대호기압
  unit: cmH2O
  category: R_Pulmonary_Function_Test
  ref_source: ATS/ERS 2002 Respiratory Muscle Testing
  ranges:
    lower: 90
    upper: 230
  thresholds:
  - name: normal_men
    criterion: '>90 cmH2O'
    source: ATS/ERS 2002
  - name: normal_women
    criterion: '>80 cmH2O'
    source: ATS/ERS 2002
  - name: expiratory_weakness
    criterion: <60 cmH2O
    source: ATS/ERS 2002
  - name: cough_ineffective
    criterion: <60 cmH2O → peak cough flow <270 L/min
    source: Bach JR Chest 1993
  medical_terms:
    low: Expiratory muscle weakness (weak cough)
  loinc: 19869-7
  mimic_iv_itemid: null
  mimic_iv_available: false
  measurement_context:
    environment: pulmonary_function_test
    specimen: null
    subtype: respiratory_muscle_strength
    patient_state_required: effort from TLC (maximum inspiration) held ≥1.5 seconds
    notes: Reflects expiratory and abdominal muscle strength. Weak MEP → poor cough
      clearance → aspiration/secretion retention risk.
  lung_disease_diagnostic_value:
    primary_utility:
    - neuromuscular_respiratory_disease
    - bulbar_dysfunction
    diagnostic_weight_hint: moderate
    cutoffs_for_dx:
    - disease_key: neuromuscular_disease
      threshold: MEP <60 cmH2O → ineffective cough (PCF <270 L/min)
      source: Bach Chest 1993
  disease_associations:
  - disease_key: neuromuscular_respiratory_disease
    disease_kr: 신경근육성 호흡 장애
    icd10_main:
    - G12.20
    - G12.21
    - G70.00
    - G71.2
    pattern: ↓ (expiratory/abdominal weakness → 기침 부전; secretion retention) [ATS/ERS
