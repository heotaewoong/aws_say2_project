# ── 정직성 명시 ────────────────────────────────────────────────────
honesty_disclosure:
  - '본 매핑은 lung_dx institutional convention. peer-reviewed standardized CheXpert↔Fleischner crosswalk 부재 (PubMed esearch 6 query 0건).'
  - '14 라벨 중 5 라벨(Atelectasis/Cardiomegaly/Consolidation/Edema/Pleural Effusion)만 CheXpert paper §4.2에서 board-certified radiologist 3명과 agreement 검증됨. 9 라벨은 label noise 우려.'
  - 'HPO 변환 없음 (Option E). HPO는 Phase 1 증상·Phase 5 희귀질환에만 사용.'
  - 'Fleischner 2024 Glossary verbatim 확인: "Cardiomegaly" · "Cardiothoracic ratio" · "Mediastinal widening" · 별도 "Cavitation" entry · 별도 "Pleural effusion" entry — 본문에 entry/단어 부재. v1에서 이들을 R1에 attribute한 5건은 v1.2에서 [F] reclassify.'
  - 'Fleischner 2024 §Opacity 본문 verbatim: "infiltrate"는 "obsolete and nonrecommended term"으로 분류. lung_dx는 임상 통용으로 expansion 유지 (영상의학 보고서·ATS/IDSA CAP 2019 multilobar infiltrates 표현 등에서 등장).'
  - 'expansion 토큰 자체는 영상의학 표준 용어 (Felson · Brant & Helms 등 영상의학 textbook 통용)로 실재. v1.2 정정 후 evidence section 검증 통과 비율: [V] verbatim 11건 + [F] fact 위반 8건 + [P] pending 6건.'
  - 'v1.3 (2026-05-18) — Pneumonia 라벨 "compositional label" 표현이 lung_dx 내부 paraphrase 임을 arXiv 1901.07031 PDF grep "compositional" 0 hits 로 확인. CheXpert 원전 verbatim ("14 observations" + Pneumonia "despite being a clinical diagnosis" + "conforming to the Fleischner Society''s recommended glossary") 으로 정정. fact 위반 누적 9건.'
  - 'CheXpert 14 라벨 ≠ Fleischner descriptor 의 입자도 차이 근거 (verbatim 2건 결합): (a) CheXpert 원전 = 14를 "observations" 로 명명하되 Pneumonia 는 "clinical diagnosis" 임을 인정. (b) Fleischner 2024 = "Some terms are labeled as descriptors to differentiate them from terms that imply a radiologic diagnosis." → 어댑터 필요성의 표준 근거.'
  - 'v1.6 (2026-05-18) — paraphrase 9건이 [V] 로 잘못 라벨링됨을 적발·정정. "5-label radiologist-benchmark" / "§4.2" / "catch-all radiologic abnormality" / "cardiac silhouette enlargement OR mediastinal widening 묶음" / "흉막 abnormality 묶음" 등 lung_dx 내부 paraphrase 가 [V] 표기됨. arXiv 1901.07031 PDF grep 으로 모두 0 hits 확인. 실제 CheXpert verbatim ("5 selected pathologies" + "consensus of 5 board-certified radiologists" + Abstract "On Cardiomegaly, Edema, and Pleural Effusion ... above all 3 radiologist operating points" + Table 헤더 "Atelectasis Cardiomegaly Consolidation Edema Pleural Effusion") 으로 교체. fact 위반 누적 18건.'
  - 'v1.6 reference 2025/2026 update: R9 CAP 2026 (Jones BE AJRCCM 2026 Jan, PMID 40679934) — R3 ATS/IDSA CAP 2019 의 update. R10 Fleischner ILD 2025 (Ryerson CJ AJRCCM 2025 Oct, PMID 40758555) — R1 Fleischner 2024 main glossary 의 ILD 전용 보강. 두 reference 모두 본 시점 full text 미접근 → [P] pending. R11 AHA/ACC PE 2026 + R12 WHO TB 2026 은 chexpert 14 라벨 직접 매핑 대상 아님 — disease profile YAML 참조용으로 reference 섹션에만 등재 (정직 공시).'

