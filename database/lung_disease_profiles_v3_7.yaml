interstitial_lung_disease:
  disease_kr: 간질성 폐질환 / 폐섬유화증
  icd10:
  - J84
  - J84.1
  - J84.10
  - J84.112
  - J84.17
  - J84.9
  icd11: CB03
  icd9: '516.9'
  weights:
    symptoms: 0.15
    lab: 0.25
    radiology: 0.5
    micro: 0.1
  symptoms:
  - dyspnea
  - dry cough
  - fatigue
  - clubbing
  - weight loss
  hpo_symptom_map:
    dyspnea: HP:0002094
    dry cough: HP:0031245
    fatigue: HP:0012378
    clubbing: HP:0001034
    weight loss: HP:0001824
  lab_patterns:
  - Elevated LDH (tissue damage/hemolysis)
  - Elevated CRP (inflammation)
  radiology_findings:
  - ground glass
  - fibrosis
  - honeycombing
  - reticular
  - septal thickening
  - interstitial
  - subpleural predominance
  - basal predominance
  - traction bronchiectasis
  - UIP pattern
  micro_findings: []
  references:
  - Raghu G et al. ATS/ERS/JRS/ALAT IPF 2022 (AJRCCM)
  - Fleischner Society ILD Consensus Statement 2025 (Ryerson CJ et al. Am J Respir Crit Care Med 2025;211(10):1756-1774; PMID 40758555) — ILD 임상 용어/표현형 표준화
  - ATS/ERS IIP Classification 2013
  - Harrison's 21st Ch.290
  - '[v6+ 가중치 조정 2026-04-20] v6+: PFT(FVC/DLCO)/SpO2/KL-6 모두 L → L 0.15→0.25 상향, R
    0.55→0.50 하향, S 하향'
  - '[ICD-10-CM specific 메타] J84.10/J84.112/J84.17 (3건) — WHO ICD-10 base는 J84.0/.1/.8/.9
    (WHO base). ICD-CM 5-7자리는 임상 specificity (예: J96.01 hypoxic vs J96.02 hypercapnic
    치료 분리) 보존 위해 유지. 호환: MIMIC-IV (ICD-CM 표준) + KOSTAT KCD 8판 (2020) + 국내 EMR. 정책:
    lung_dx/ARCHITECTURE.md §ICD-10-CM specific 코드 정책 참조 (2026-05-19 결정)'
