  icd9: '492.8'
  weights:
    symptoms: 0.45
    lab: 0.4
    radiology: 0.1
    micro: 0.05
  weight_rationale:
    version: v3_3
    date: '2026-05-14'
    change: S:0.20→0.45, L:0.30→0.40, R:0.40→0.10, M:0.10→0.05
    reason: 'GOLD 2026 Report v1.3 (2025-12-08), p.46: "A chest X-ray is not

      useful to establish a diagnosis in COPD." COPD/Emphysema 진단의

      gateway는 post-bronchodilator spirometry FEV1/FVC < 0.7 (GOLD 2026

      Chapter 2, mandatory criterion) — L축 0.30→0.40 상향. 만성 진행성

      호흡곤란·만성 기침·체중감소 등 임상 S축 우위 (Harrison''s 21st

      Ch.293) — S 0.20→0.45 상향. R축은 CXR 진단 비유용성과 CheXpert

      모달리티에 emphysema 라벨 부재로 0.40→0.10 하향. 미생물 기여 최소

      0.10→0.05. CT 정량 분석(LAA −950 HU)은 CXR Phase 2 범위 외.

      '
    references:
    - GOLD 2026 Report v1.3 (8 Dec 2025) — goldcopd.org §Imaging p.46
    - Agusti A, et al. GOLD 2023 Executive Summary. Eur Respir J 2023;61(4):2300239.
      PMID 37321613
    - Harrison's Principles of Internal Medicine, 21st Ed (2022), Ch.293 COPD
