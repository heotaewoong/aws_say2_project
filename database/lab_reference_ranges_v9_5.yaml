    Clear: 정상 vesicular 호흡음
    Diminished: 폐음 감소 — 우측 흉수(가장 흔한 원인), 우측 기흉, 우하엽 무기폐, 비만, COPD 과팽창 [Bates' 13th]
    Absent: 폐음 소실 — 대량 우측 기흉, 대량 우측 흉수, 완전 우하엽 무기폐 [Harrison's 21st]
    Crackles: '수포음 — (1) Fine: IPF/ILD 양측 기저부 velcro crackles, 초기 폐부종 [NEJM 2014];
      (2) Coarse: 흡인성 폐렴(RLL이 해부학적으로 가장 호발), 세균성 폐렴, 기관지확장증 [Harrison''s 21st]'
    Rhonchi: 저음 연속음 — 기도 분비물(COPD 악화, 기관지확장증); 기침 후 소실 또는 변화 [NEJM 2014; ERS 2000]
    Wheezes: 고음 연속음 — 천식, COPD 악화; RLL 국소 wheezes 시 기관지 내 종양/이물 감별 필요 [Forgacs, Chest
      1978]
    Bronchial: 기관지성 호흡음 — 폐 말초에서 청취 시 consolidation(대엽성 폐렴), 무기폐 인접 부위 [NEJM 2014]
  note: RLL은 흡인성 폐렴��� 가장 호발 부위 — 우주기관지가 좌측보다 넓고(평균 16mm vs 13mm), 짧고(2.5cm vs 5cm),
    수직 각도가 가파름(25° vs 45°)으로 흡인물이 중력에 의해 우선 유입 [Harrison's 21st Ch.257; Murray & Nadel
    7th Ch.36]. 또한 자유 흉수는 중력 의존적으로 하엽에 저류하며, 간 때문에 우측 횡격막이 높아 우측 흉수가 좌측보다 임상적으로 더
    흔하게 감지됨 [Bates' 13th].
