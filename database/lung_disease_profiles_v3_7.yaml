chronic_bronchitis:
  disease_kr: 만성 기관지염
  icd10:
  - J41
  - J41.0
  - J41.1
  - J41.8
  - J42
  icd11: CB21
  icd9: '491.0'
  weights:
    symptoms: 0.45
    lab: 0.3
    radiology: 0.1
    micro: 0.15
  weight_rationale:
    version: v3_3
    date: '2026-05-14'
    change: S:0.30→0.45, L:0.25→0.30, R:0.25→0.10, M:0.20→0.15
    reason: 'GOLD 2026 Report v1.3 (2025-12-08): chronic bronchitis는 임상 정의

      (만성 객담 ≥ 3개월/년, 연속 2년) — clinical diagnosis. CXR 영상

      소견(peribronchial thickening, hyperinflation)은 보조 — GOLD 2026

      p.46 "A chest X-ray is not useful to establish a diagnosis in COPD".

      Spirometry(FEV1/FVC <0.7)로 airflow obstruction 확인하면 COPD

      phenotype 진단 — L축 0.25→0.30. 만성 임상 증상 history 상향

      0.30→0.45. R축 0.25→0.10. 감염성 악화 동반 시 M축 의의 유지 0.15.

      '
    references:
    - GOLD 2026 Report v1.3 (8 Dec 2025) — goldcopd.org §Imaging p.46
    - Agusti A, et al. GOLD 2023 Executive Summary. Eur Respir J 2023;61(4):2300239.
      PMID 37321613
    - Harrison's Principles of Internal Medicine, 21st Ed (2022), Ch.293 COPD
  symptoms:
  - chronic cough
  - sputum production
  - dyspnea
  - wheezing
  - chest tightness
  - fatigue
