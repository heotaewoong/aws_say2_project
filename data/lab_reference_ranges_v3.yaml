    - J12
    - J12.9
    pattern: COVID-19 감별진단의 핵심; 다른 호흡기 바이러스(인플루엔자, RSV)와 multiplex PCR로 동시 감별 [CDC 2020]
53186:
  name: Rapid SARS-CoV-2 PCR (COVID-19 Rapid PCR)
  unit: Detected/Not detected
  category: J_Infection_Microbiology
  ref_source: FDA EUA; Cepheid Xpert Xpress; Abbott ID NOW; WHO 2021
  mimic_iv_itemid: 53186
  interpretation: 'Not detected = 음성. Detected = SARS-CoV-2 양성. 신속 NAAT (결과 15분-1시간). Point-of-care 사용 가능. Standard RT-PCR
    대비 sensitivity 다소 낮을 수 있음 (Abbott ID NOW: ~93-95%)'
  medical_terms:
    high: Detected (SARS-CoV-2 양성)
  loinc: 95409-9
  disease_associations:
  - disease_key: covid_19
    disease_kr: COVID-19 (SARS-CoV-2 감염)
    icd10_main: *id024
    pattern: Detected → COVID-19 양성; 응급 상황에서 신속 진단; 음성이나 임상적 의심 높으면 standard RT-PCR 재검 권고 [FDA EUA; WHO 2021]
51560:
  name: Anti-SARS-CoV-2 IgA Antibody
  unit: Index (S/CO ratio)
  category: G_Immunology_Autoantibodies
  ref_source: WHO COVID-19 Serology 2020; Deeks et al. Cochrane 2020
  mimic_iv_itemid: 51560
  ranges:
    lower: 0
  thresholds:
  - name: positive
    criterion: ≥1.0 (S/CO)
    source: Assay-dependent (Euroimmun 등)
    note: 양성 판정 기준은 제조사별 상이
  interpretation: 음성 (<1.0) = 항체 미검출. 양성 (≥1.0) = SARS-CoV-2 감염 후 또는 백신 접종 후 면역 반응. IgA는 점막 면역 반영; IgG보다 조기 출현 (증상 후 ~5-7일).
    급성 진단 목적으로는 부적합 (seroconversion에 시간 필요)
  medical_terms:
    high: Anti-SARS-CoV-2 IgA Positive (과거 감염 또는 백신 면역 반응)
  loinc: 96118-5
  note: 혈청학적 검사는 급성 진단이 아닌 역학조사/면역 상태 확인 목적. IgM(초기)/IgG(후기)/IgA(점막)는 각각 출현 시점과 지속 기간이 다름. 백신 접종자에서도 양성 → 감염 vs 백신 구별에 nucleocapsid(N)
    vs spike(S) 항체 구분 필요 [Deeks et al. Cochrane 2020].
  disease_associations:
  - disease_key: covid_19
    disease_kr: COVID-19 (SARS-CoV-2 감염)
    icd10_main: *id024
    pattern: 양성 → 과거 SARS-CoV-2 감염 또는 백신 면역; 급성 진단에는 RT-PCR 우선; seroconversion 확인(급성기+회복기 쌍혈청)으로 후향적 진단 가능 [WHO 2020; Deeks,
      Cochrane 2020]
EXT_AH:
  name: SARS-CoV-2 Rapid Antigen Test
  unit: Positive/Negative
  category: J_Infection_Microbiology
  mimic_iv_available: false
  ref_source: WHO Interim Guidance on Ag-RDTs 2021; Dinnes et al. Cochrane 2021
  interpretation: 'Negative = 항원 미검출. Positive = SARS-CoV-2 항원 검출. Sensitivity: 증상 첫 주 ~80-90%, 무증상 ~50-70%. Specificity >99%.
    위음성 가능 → 임상 의심 시 RT-PCR 확인 필요'
  medical_terms:
    high: Positive (SARS-CoV-2 항원 검출)
  loinc: 97099-6
  note: Point-of-care 신속 진단 (15-30분). 바이러스 부하 높은 시기(증상 발현 전후)에 sensitivity 최고. Omicron 변이에서 일부 키트 sensitivity 저하 보고. WHO는
    RT-PCR 접근 어려운 상황 또는 선별검사에 권고 [WHO 2021; Dinnes et al. Cochrane 2021].
  disease_associations:
  - disease_key: covid_19
    disease_kr: COVID-19 (SARS-CoV-2 감염)
    icd10_main: *id024
    pattern: Positive → COVID-19 추정 진단; 증상 첫 5-7일 내 sensitivity 최고 (~80-90%); 음성이라도 임상적 의심 시 RT-PCR 확인 [WHO Ag-RDT Guidance
      2021; Dinnes, Cochrane 2021]
EXT_AI:
  name: SARS-CoV-2 IgG/IgM Antibody
  unit: Positive/Negative or Index
  category: G_Immunology_Autoantibodies
  mimic_iv_available: false
  ref_source: WHO COVID-19 Serology 2020; Deeks et al. Cochrane 2020; Guo et al. Clin Infect Dis 2020
  interpretation: 'IgM: 증상 후 ~3-7일 출현, 2-3주 peak, 이후 감소. IgG: 증상 후 ~10-14일 출현, 수개월 지속. 급성 진단에 부적합 (window period). 과거 감염 확인/역학조사에
    사용. Anti-N(nucleocapsid) → 자연감염, Anti-S(spike) → 감염 또는 백신'
  medical_terms:
    high: Positive (SARS-CoV-2 면역 반응 — 과거 감염 또는 백신)
  loinc: 94762-2
  note: 'Sensitivity: 증상 후 1주 <30%, 2주 ~70%, 3주 >90% [Deeks, Cochrane 2020]. 교차반응: 다른 코로나바이러스(HCoV-OC43 등)와 가능. 백신 접종 보편화로
    해석 복잡 → Anti-N vs Anti-S 구분 필수.'
  disease_associations:
  - disease_key: covid_19_infection
    disease_kr: COVID-19 감염 (SARS-CoV-2 감염)
    icd10_main: *id024
    pattern: 양성(IgG) → 과거 감염 또는 백신; 쌍혈청(acute + convalescent)에서 IgG 4배 이상 상승 → 후향적 진단 가능; seroprevalence 조사에 핵심 [WHO 2020;
      Guo et al. CID 2020]
EXT_AJ:
  name: NLR (Neutrophil-to-Lymphocyte Ratio)
  unit: Ratio (계산값)
  category: B_CBC_Hematology
  mimic_iv_available: 계산값 — 51256 Neutrophils(%) / 51244 Lymphocytes(%)로 산출
  ref_source: Liu et al. J Transl Med 2020 (COVID-19); Cedrés et al. Lung Cancer 2012 (NSCLC); Forget et al. BMC Res Notes
    2017 (정상 범위)
  ranges:
    lower: 1.0
    upper: 3.0
  thresholds:
  - name: covid_severe
    criterion: ≥3.13
    source: Liu et al. J Transl Med 2020
    note: COVID-19 중증 진행 예측 (sensitivity 87.5%)
  - name: covid_critical
    criterion: ≥5.0
    source: Yang et al. Int J Infect Dis 2020
    note: COVID-19 ICU 입원/사망 위험 증가
  - name: nsclc_poor_prognosis
    criterion: ≥5.0
    source: Cedrés et al. Lung Cancer 2012
    note: NSCLC 불량 예후 cut-off
  - name: sepsis_indicator
    criterion: ≥10
    source: Zahorec R. Bratisl Lek Listy 2001
    note: 중증 패혈증/패혈성 쇼크 시사
  medical_terms:
    low: Normal (정상 면역 균형)
    high: Elevated NLR (전신 염증/면역 억제/불량 예후 지표)
    critical_high: Markedly Elevated NLR ≥10 (중증 패혈증/전신 염증)
  loinc: 770-8 / 736-9 (구성요소)
  note: NLR = Absolute Neutrophil Count / Absolute Lymphocyte Count (또는 %비율). 단순하지만 강력한 예후 인자. COVID-19, NSCLC, 패혈증 등에서 독립적
    예후 예측력 입증. MIMIC-IV에서 CBC differential로부터 산출 가능.
  disease_associations:
  - disease_key: covid_19
    disease_kr: COVID-19 (SARS-CoV-2 감염)
    icd10_main: *id024
    pattern: ↑ (NLR ≥3.13 → 중증 진행 예측 sensitivity 87.5%; ≥5 → ICU/사망 위험 증가; 입원 시 NLR은 독립적 예후 인자) [Liu et al. J Transl Med 2020;
      Yang et al. Int J Infect Dis 2020]
  - disease_key: lung_cancer
    disease_kr: 폐암
    icd10_main:
    - C34.0
    - C34.1
    - C34.9
    pattern: ↑ (NLR ≥5 → NSCLC 불량 예후; 전체 생존/무진행 생존과 역상관; 면역항암제 반응 예측 보조) [Cedrés et al. Lung Cancer 2012; Mezquita et al.
      JAMA Oncol 2018]
  - disease_key: community_acquired_pneumonia
    disease_kr: 지역사회획득 폐렴 (CAP)
    icd10_main:
    - J13
    - J14
    - J15
    - J18
    pattern: ↑ (중증 폐렴에서 상승; 패혈증 동반 시 NLR ≥10) [de Jager et al. Crit Care 2010]
  - disease_key: ards
    disease_kr: 급성호흡곤란증후군 (ARDS)
    icd10_main:
    - J80
    pattern: ↑ (전신 염증 반영; 높을수록 사망률 증가)
  - disease_key: copd_exacerbation
    disease_kr: COPD 급성 악화
    icd10_main:
    - J44.0
    - J44.1
    pattern: ↑ (급성 악화 시 상승; 안정기 NLR 상승은 빈번한 악화 예측) [Lee et al. Int J COPD 2016]


# ═══════════════════════════════════════════════════════════════
# FOOTNOTES — 본 파일의 구조와 threshold에 대한 상세 설명
# ═══════════════════════════════════════════════════════════════
#
# ───────────────────────────────────────────────────────────────
# [F1] 파일 구조 개요
# ───────────────────────────────────────────────────────────────
#
# 본 YAML은 폐 질환 진단 보조에 필요한 89개 검사항목의 참조 범위
# 및 질환 연관 정보를 담고 있다. 각 항목은 다음 필드로 구성된다:
#
#   name          : 영문 검사명
#   unit          : 측정 단위
#   ref_source    : 참고문헌 (Tietz, Harrison's 등)
#   ranges        : 정상 범위 {lower, upper}
#   critical      : 위험 역치 {low, high} — 20개 항목에만 존재
#   thresholds    : 가이드라인 결정 기준값 — 15개 항목에만 존재
#   medical_terms : 비정상 시 표준 의학 용어
#   loinc         : LOINC-2 코드 (표준 검사 식별자)
#   category      : 카테고리 (A~M)
#   disease_associations : 질환별 패턴
#   note          : 보충 설명 — 13개 항목에만 존재
#
# ───────────────────────────────────────────────────────────────
# [F2] 카테고리 분류 (A~M) — 13개 카테고리, 89개 항목
# ───────────────────────────────────────────────────────────────
#
# 카테고리 분류는 Tietz 7th Ed / LOINC / Harrison's 21st를 따른다.
#
#   A. Blood Gas Analysis (혈액가스분석) — 11항목
#      동맥혈에서 측정하는 산-염기 및 가스교환 지표.
#      pH, pO2, pCO2, HCO3, Base Excess, Lactate, A-a gradient 등.
#      [Tietz 7th Ch.28; Harrison's 21st Appendix]
#
#   B. CBC / Hematology (일반혈액검사) — 12항목
#      전혈구계산(CBC)과 혈액학적 지표.
#      WBC, Hgb, Hct, Platelets, 백혈구감별(Neutrophil/Lymphocyte/
#      Eosinophil/Basophil %), ESR, NLR 등.
#      [Tietz 7th Ch.31; WHO Haemoglobin Standards]
#
#   C. Chemistry / Electrolytes (생화학/전해질) — 12항목
#      혈청 화학검사와 전해질.
#      Albumin, Creatinine, BUN, Glucose, Calcium, Phosphate,
#      Potassium, Sodium, Magnesium, LDH, RDW, 흉수 Total Protein.
#      [Tietz 7th Ch.14-16; Harrison's 21st]
#
#   D. Inflammatory Markers (염증표지자) — 6항목
#      감염과 염증을 반영하는 생체표지자.
#      CRP, hs-CRP, Procalcitonin(PCT), Ferritin, ESR, 흉수 LDH.
#      [Tietz 7th Ch.19; Surviving Sepsis 2021]
#
#   E. Coagulation (응고검사) — 5항목
#      혈액 응고 기능 평가.
#      D-Dimer(2개 ItemID), Fibrinogen, INR, PT.
#      [Tietz 7th Ch.32; ESC PE Guidelines 2022; ISTH DIC Criteria]
#
#   F. Cardiac Markers (심장표지자) — 4항목
#      심근 손상 및 심부전 평가.
#      BNP, NT-proBNP, Troponin T(hs-cTnT), Troponin I.
#      [Tietz 7th Ch.17; ESC Heart Failure 2021]
#
#   G. Immunology / Autoantibodies (면역/자가항체) — 12항목
#      자가면역 질환 및 감염 면역 반응 평가.
#      ANA, RF, ANCA(PR3/MPO), Total IgE, Complement(C3/C4),
#      COVID-19 항체(IgA, IgG/IgM) 등.
#      [Tietz 7th Ch.23; Harrison's 21st; ACR/EULAR]
#
#   H. ILD Biomarkers (간질성 폐질환 생체표지자) — 5항목
#      ILD 진단 및 감별에 특화된 표지자.
#      KL-6, SP-D, SP-A, ACE, Telomere/Surfactant Gene Panel.
#      [ATS/ERS ILD 2022; Ohshimo Respirology 2009]
#
#   I. Tumor Markers (종양표지자) — 4항목
#      폐암 진단/모니터링 표지자.
#      CEA, CYFRA 21-1, NSE, PD-L1(TPS).
#      [NCCN NSCLC 2024; Tietz 7th Ch.20]
#
#   J. Infection / Microbiology (감염/미생물) — 10항목
#      감염 원인체 직접 검출 및 면역 반응 검사.
#      AFB smear/culture, 결핵 IGRA, Aspergillus GM,
#      Beta-D-Glucan, 호흡기 바이러스 PCR, COVID-19 RT-PCR/
#      Rapid PCR/Rapid Ag.
#      [CLSI M48-A; IDSA Aspergillosis 2016; WHO COVID-19 2020]
#
#   K. Pleural Fluid Analysis (흉수검사) — 3항목
#      흉수의 삼출액/여출액 감별 검사.
#      ADA, pH, Glucose(흉수).
#      [Light, NEJM 2002; BTS Pleural Disease 2023]
#
#   L. Molecular / Genetics (분자/유전) — 3항목
#      표적치료 및 유전 질환 진단을 위한 분자검사.
#      EGFR mutation, ALK rearrangement, Lung Cancer NGS Panel.
#      [CAP/IASLC/AMP Molecular Testing 2018; NCCN NSCLC 2024]
#
#   M. Specialty Tests (특수검사) — 2항목
#      FeNO(호기 산화질소), 6-Minute Walk Test.
#      [ATS/ERS FeNO 2011; ATS 6MWT 2002]
#
# ───────────────────────────────────────────────────────────────
# [F3] ranges vs critical vs thresholds — 세 가지 기준의 차이
# ───────────────────────────────────────────────────────────────
#
# (1) ranges (정상 범위) — 89개 항목 모두 보유
#
#   건강한 성인에서 기대되는 수치 범위이다.
#   {lower, upper}로 구성되며, 값이 lower 미만이면 Low,
#   upper 초과이면 High, 범위 안이면 Normal로 해석한다.
#
#   예: WBC ranges {lower: 4.5, upper: 11.0}
#       → 4,500~11,000 /μL이 정상.
#       → 3,500이면 Low(Leukopenia), 15,000이면 High(Leukocytosis).
#
#   일부 항목은 성별에 따라 다른 범위를 가진다:
#     Hematocrit(51221): 남성 38.3~48.6%, 여성 35.5~44.9%
#     ESR(51288):        남성 0~15 mm/hr, 여성 0~20 mm/hr
#     Ferritin(50924):   남성 24~336 ng/mL, 여성 11~307 ng/mL
#   이들은 lower_male/upper_male, lower_female/upper_female 형태이다.
#   [Tietz 7th Ed; WHO Haemoglobin Standards]
#
#   정성검사(qualitative tests) 4개 항목은 숫자 ranges가 없다:
#     EXT_F (ANCA PR3), EXT_G (ANCA MPO) — Positive/Negative
#     EXT_V (PD-L1 TPS) — 구간별 판정 (thresholds로 기술)
#     EXT_Y (Pleural Fluid Glucose) — 참조는 Light criteria 참고
#
# (2) critical (위험 역치) — 20개 항목에만 존재
#
#   생명에 위험을 줄 수 있어 즉각적인 의료 조치가 필요한 수치이다.
#   "panic value" 또는 "alert value"라고도 부른다.
#   검사실에서 이 값이 나오면 담당 의사에게 즉시 통보해야 한다.
#
#   {low, high} 중 하나 또는 둘 다 있을 수 있다.
#   모든 critical 값은 ranges를 벗어나는 방향에 있다.
#
#   ranges와의 관계:
#     정상 ←──────── 비정상 ──────── 위험(critical)
#     예: pO2
#       ranges:  80~100 mmHg (정상)
#       65 mmHg → ranges 기준 Low (Hypoxemia) — "비정상"
#       55 mmHg → critical.low 60 미만 → Critical Low — "위험"
#
#   현재 critical이 있는 20개 항목:
#     A. 혈액가스: pO2(low:60, high:500), pCO2(low:20, high:60),
#        pH(low:7.2, high:7.55), Base Excess(±10), Lactate(high:4.0),
#        Temp(low:35, high:40), LDH(high:500)
#     B. 혈액: WBC(low:2.0, high:30.0), Hgb(low:7.0),
#        Platelets(low:50, high:1000), Hct(low:25, high:60)
#     C. 생화학: Glucose(low:50, high:400), K+(low:3.0, high:6.0),
#        Na+(low:120, high:155)
#     D. 염증: CRP(high:100), hs-CRP(high:10.0), Ferritin(high:1000)
#     F. 심장: BNP(high:500), NT-proBNP(high:900), hs-cTnT(high:0.1)
#   [Tietz 7th Ch.5 "Reference Values"; CAP checklist for critical values]
#
# (3) thresholds (가이드라인 결정 기준값) — 15개 항목에만 존재
#
#   특정 "임상 판단" 또는 "치료 결정"이 발동되는 지점이다.
#   ranges(정상/비정상)이나 critical(위험)과는 별개로,
#   특정 가이드라인에서 정의한 진단·치료 기준이다.
#
#   thresholds의 구성:
#     name      : 기준의 식별명 (snake_case)
#     criterion : 비교 연산자 + 수치 (가이드라인 원문 그대로)
#     source    : 해당 기준이 정의된 가이드라인/논문
#     note      : 추가 설명 (선택)
#
#   ranges/critical과의 핵심 차이:
#     - ranges:    "이 값이 정상인가?" → 모든 검사에 적용
#     - critical:  "이 값이 위험한가?" → 즉시 조치 필요
#     - thresholds:"이 값으로 어떤 진단/치료 결정을 내릴 수 있는가?"
#                  → 특정 질환·상황에서만 의미 있음
#
#   예: D-Dimer (50915)
#     ranges: {lower: 0, upper: 500} → 500 이상이면 비정상
#     thresholds:
#       pe_rule_out: <500
#         → D-Dimer < 500이면 PE를 배제할 수 있다
#            [ESC PE Guidelines 2022]
#       dic_suggestive: >5000
#         → D-Dimer > 5,000이면 DIC(파종성 혈관내 응고)를 시사
#            [ISTH DIC Criteria]
#     → 같은 D-Dimer 값이라도 "PE 배제" vs "DIC 시사"라는
#       전혀 다른 임상 맥락에서 다른 기준이 적용된다.
#
#   예: Procalcitonin (EXT_U)
#     ranges: {lower: 0, upper: 0.1} → 0.1 초과면 비정상
#     thresholds 5단계:
#       bacterial_unlikely:       <0.25   → 세균감염 가능성 낮음
#       bacterial_likely:         ≥0.25   → 세균감염 가능성 있음
#       bacterial_highly_likely:  ≥0.50   → 세균감염 가능성 높음
#       severe_sepsis:            ≥2.0    → 중증 패혈증 시사
#       antibiotic_stop_consider: <0.25 or ≥80% drop from peak
#         → 항생제 중단 고려 가능
#     → 하나의 검사가 진단(감염 여부)과 치료(항생제 중단)
#       두 가지 목적의 기준값을 모두 가진다.
#     [Schuetz et al. Cochrane 2017; Surviving Sepsis 2021]
#
# ───────────────────────────────────────────────────────────────
# [F4] threshold criterion 연산자 읽는 법
# ───────────────────────────────────────────────────────────────
#
#   <500    : 500 미만 (500 불포함)   — "500보다 낮으면"
#   ≤30     : 30 이하 (30 포함)      — "30 또는 그보다 낮으면"
#   >0.5    : 0.5 초과 (0.5 불포함)  — "0.5보다 높으면"
#   ≥0.25   : 0.25 이상 (0.25 포함)  — "0.25 또는 그보다 높으면"
#   1–49%   : 1% 이상 49% 이하 범위  — "1%에서 49% 사이이면"
#   A or B  : A 또는 B 중 하나라도 해당 — 복합 조건
#
#   특수 표현:
#   Age/4 + 4       : 나이에 따라 변하는 공식
#     (예: A-a gradient — 40세이면 40/4+4 = 14 이하가 정상)
#   흉수/혈청 ratio : 흉수 수치를 혈청 수치로 나눈 비율
#     (예: Light criteria — 흉수 Total Protein / 혈청 Total Protein)
#   ≥80% drop from peak : 최고치 대비 80% 이상 감소
#     (예: Procalcitonin 항생제 중단 기준)
#
#   모든 연산자는 각 가이드라인 원문에서 사용한 표현을 그대로 반영했다.
#   [ESC PE 2022; Light NEJM 2002; Schuetz Cochrane 2017]
#
# ───────────────────────────────────────────────────────────────
# [F5] 15개 threshold 항목 요약 — 임상적 의미
# ───────────────────────────────────────────────────────────────
#
# (1) A-a Gradient (50801)
#     정의: PAO2(폐포 산소분압) − PaO2(동맥 산소분압)
#     의미: 폐 가스교환 효율의 지표. 높을수록 가스교환 장애.
#     정상: 나이에 따라 변함 (Age/4 + 4, 젊은 성인 <15 mmHg)
#     >30 → 유의한 가스교환 장애 (V/Q mismatch, shunt, 확산장애)
#     PE에서는 A-a gradient ↑ + pO2 ↓가 전형적이다.
#     [Harrison's 21st Ch.286]
#
# (2) BUN (51006)
#     CURB-65 구성요소: BUN ≥20 mg/dL (≈Urea ≥7 mmol/L) → +1점
#     CURB-65는 CAP의 중증도를 평가하는 스코어링 시스템이다.
#     BUN 상승은 탈수, 신기능 저하, 또는 감염의 이화 항진을 반영한다.
#     [Lim et al. Thorax 2003;58(5):377-382]
#
# (3) Pleural Fluid Total Protein (51059)
#     Light criteria: 삼출액(exudate) vs 여출액(transudate) 감별의 핵심.
#     흉수/혈청 Total Protein ratio > 0.5 → 삼출액
#     절대값 > 3.0 g/dL → 삼출액 (단독 기준)
#     삼출액: 감염, 악성종양, 자가면역 등 활동성 병변
#     여출액: 심부전, 간경변 등 수분 불균형
#     [Light RW. Pleural effusions. NEJM 2002;346(25):1971-1977]
#
# (4) Procalcitonin (EXT_U)
#     세균 감염과 바이러스 감염을 감별하는 생체표지자.
#     세균 감염 시 갑상선 외 조직(간, 폐, 장)에서 생성되어 급상승한다.
#     <0.25: 세균감염 가능성 낮음 → 항생제 보류 가능
#     ≥0.25: 세균감염 가능성 → 항생제 시작 고려
#     ≥0.50: 세균감염 가능성 높음
#     ≥2.0 : 중증 패혈증 시사 (Surviving Sepsis Campaign)
#     하락 추세: peak 대비 ≥80% 감소 or <0.25 → 항생제 중단 고려
#     PCT 기반 항생제 stewardship은 항생제 사용 기간을 평균 2일 단축하고
#     사망률을 증가시키지 않는다.
#     [Schuetz et al. Cochrane Database Syst Rev 2017;10:CD004420]
#
# (5) Pleural Fluid LDH (51054)
#     Light criteria 구성요소: 흉수/혈청 LDH ratio > 0.6
#       또는 흉수 LDH > 200 U/L → 삼출액
#     LDH > 1,000 U/L → 복잡성 부폐렴 흉수(complicated parapneumonic
#       effusion) 또는 농흉 시사 → 배액(drainage) 필요성 평가
#     [Light NEJM 2002; BTS Pleural Disease Guidelines 2023]
#
# (6-7) D-Dimer (50915, 51196 — 동일 검사, MIMIC ItemID 2개)
#     피브린 분해산물로, 혈전 형성 후 용해 시 혈중 상승한다.
#     PE 배제: D-Dimer < 500 ng/mL (FEU) → 저·중간 사전확률에서
#       PE를 배제할 수 있다. 음성예측도가 매우 높다.
#     연령 보정: 50세 초과 환자에서 age × 10 ng/mL을 기준값으로
#       사용하면 특이도가 향상된다 (예: 70세 → 700 ng/mL).
#     DIC 시사: > 5,000 ng/mL → DIC(파종성 혈관내 응고) 가능성
#     주의: D-Dimer 양성(≥500)은 비특이적이다. 감염, 수술, 외상,
#       악성종양, 임신 등에서도 상승한다.
#     [ESC PE Guidelines 2022; ISTH DIC Criteria; Righini et al.
#      Ann Intern Med 2014 (age-adjusted D-dimer)]
#
# (8) Total IgE (51674)
#     혈청 총 IgE는 아토피/알레르기 상태의 지표이다.
#     >100 IU/mL: 상승 (아토피, 알레르기 질환, 기생충 감염)
#     >1,000 IU/mL: 알레르기성 기관지폐 아스페르길루스증(ABPA) 시사
#       ABPA 진단 기준의 필수 항목 중 하나이다.
#       천식 + IgE >1,000 + Aspergillus 감작 → ABPA 강력 의심
#     [ISHAM ABPA Working Group. Clin Exp Allergy 2013;43(8):850-873;
#      Harrison's 21st Ch.287]
#
# (9) PD-L1 Expression TPS (EXT_V)
#     종양 세포 표면의 PD-L1 발현 비율 (Tumor Proportion Score).
#     비소세포폐암(NSCLC)에서 면역항암제(pembrolizumab 등)의
#     치료 대상 선별에 사용한다.
#     <1%  : PD-L1 음성 → 면역단독치료 대상 아님
#     1~49%: PD-L1 저발현 → 면역+항암 병용 고려
#     ≥50% : PD-L1 고발현 → 면역단독치료(1차) 가능 (KEYNOTE-024)
#     22C3 항체 clone이 표준 검사법이다.
#     [NCCN NSCLC Guidelines 2024; Reck et al. NEJM 2016 (KEYNOTE-024)]
#
# (10) Aspergillus Galactomannan (EXT_N)
#     아스페르길루스 세포벽 성분(galactomannan)의 혈청/BAL 검출.
#     침습성 폐 아스페르길루스증(IPA) 조기 진단에 핵심적이다.
#     혈청: index ≥ 0.5 → 양성 (sensitivity ~70% 면역저하 환자)
#     BAL : index ≥ 1.0 → 양성 (sensitivity ~90%, 혈청보다 높음)
#     위양성: piperacillin-tazobactam, 일부 식품, 다른 진균 감염
#     면역정상 환자에서는 sensitivity가 낮다.
#     [IDSA Aspergillosis Guidelines 2016; Patterson et al.
#      Clin Infect Dis 2016;63(4):e1-e60]
#
# (11) Beta-D-Glucan (EXT_H)
#     대부분의 진균 세포벽에 존재하는 Beta-D-Glucan의 혈청 검출.
#     ≥80 pg/mL: 양성 → 침습성 진균감염 의심
#     >300 pg/mL: Pneumocystis jirovecii 폐렴(PCP) 강력 시사
#       PCP에서 BDG의 sensitivity는 90% 이상이다.
#     주의: Mucor/Rhizopus/Cryptococcus는 BDG를 생성하지 않으므로
#       이들 진균감염에서는 위음성이 나온다.
#     위양성: 혈액투석, albumin 수혈, 일부 거즈, IV immunoglobulin
#     [Fungitell assay; Tasaka et al. Chest 2007;131(4):1173-1180;
#      Onishi et al. J Clin Microbiol 2012]
#
# (12) Pleural Fluid ADA (EXT_W)
#     아데노신 탈아미나제(ADA)는 림프구에서 주로 생성된다.
#     ≥40 U/L: 결핵성 흉막염 양성 (sensitivity 92%, specificity 90%)
#     결핵 유병률이 높은 지역에서 ADA ≥40은 강력한 진단 근거이다.
#     위양성: 류마티스 흉수, 농흉, 림프종
#     ADA <40이면 결핵성 흉막염을 배제할 수 있는 근거가 된다.
#     [Liang et al. Respir Med 2008;102(5):744-754;
#      Porcel & Esquerda. Chest 2003;123(4):1274-1279]
#
# (13) FeNO (EXT_M)
#     호기 산화질소(Fractional Exhaled Nitric Oxide)는
#     기도의 호산구성 염증을 비침습적으로 평가하는 검사이다.
#     <25 ppb : 정상 → 호산구성 염증 가능성 낮음
#     25~50 ppb: 중간 → 결과 해석 시 임상 상황 고려 필요
#     >50 ppb : 높음 → 호산구성 기도염증 가능성 높음
#       → 흡입 코르티코스테로이드(ICS) 반응 가능성 높음
#     천식 진단 보조, ICS 용량 조절, 치료 순응도 평가에 활용한다.
#     흡연자에서는 FeNO가 낮게 측정되므로 해석에 주의가 필요하다.
#     [ATS/ERS Recommendations for FeNO. Am J Respir Crit Care Med
#      2011;184(5):602-615; Dweik et al.]
#
# (14) COVID-19 IgA Antibody (51560)
#     SARS-CoV-2에 대한 IgA 항체를 검출하는 혈청학적 검사.
#     Signal/Cut-off (S/CO) ≥ 1.0 → 양성
#     IgA는 점막 면역의 주요 항체로, 호흡기 감염 초기에 상승한다.
#     양성 판정 기준(cutoff)은 제조사(Euroimmun 등)별로 상이하다.
#     항체 검사는 감염 후 1~2주 경과 시 양성 전환되므로
#     급성기 진단에는 RT-PCR(53185)이 우선이다.
#     [Guo et al. Clin Infect Dis 2020; WHO COVID-19 Diagnostics 2020]
#
# (15) NLR (EXT_AJ)
#     호중구-림프구 비율 (Neutrophil-to-Lymphocyte Ratio).
#     NLR = 절대 호중구 수 / 절대 림프구 수
#     CBC differential에서 간단히 계산할 수 있는 전신 염증 지표이다.
#     COVID-19: ≥3.13 → 중증 진행 예측 (sensitivity 87.5%)
#              ≥5.0  → ICU 입원/사망 위험 증가
#     NSCLC:   ≥5.0  → 불량 예후 (전체 생존·무진행 생존 역상관)
#     패혈증:  ≥10   → 중증 패혈증/패혈성 쇼크 시사
#     단순하지만 강력한 예후 인자로, 비용 없이 기존 CBC에서 산출 가능.
#     [Liu et al. J Transl Med 2020; Yang et al. Int J Infect Dis 2020;
#      Cedrés et al. Lung Cancer 2012; Zahorec. Bratisl Lek Listy 2001]
#
# ───────────────────────────────────────────────────────────────
# [F6] critical 값의 임상적 의미 — 20개 항목 상세
# ───────────────────────────────────────────────────────────────
#
# critical 값("panic value")은 즉각적인 의료 개입이 필요한 수준이다.
# 검사실에서 해당 결과가 나오면 담당 의사에게 즉시 전화 통보한다.
# [CAP (College of American Pathologists) Checklist; Tietz 7th Ch.5]
#
#   검사명             | critical low  | critical high | 임상적 의미
#   ──────────────────┼──────────────┼──────────────┼──────────────
#   pO2               | <60 mmHg     | >500 mmHg    | <60: 호흡부전 기준 (Type I). >500: 산소 독성 위험
#   pCO2              | <20 mmHg     | >60 mmHg     | <20: 과환기·대사보상. >60: 급성 환기부전 (Type II)
#   pH                | <7.20        | >7.55        | <7.20: 중증 산증 (심정지 위험). >7.55: 중증 알칼리증 (부정맥)
#   Base Excess       | <-10 mEq/L   | >+10 mEq/L   | <-10: 중증 대사산증. >+10: 중증 대사알칼리증
#   Lactate           | —            | >4.0 mmol/L  | 조직 저관류/쇼크 → Surviving Sepsis: Lactate ≥4 = 패혈성 쇼크
#   Temp (BGas)       | <35.0°C      | >40.0°C      | <35: 중증 저체온. >40: 과고열 (중추신경 손상 위험)
#   LDH               | —            | >500 U/L     | 광범위 조직 손상 (PCP, 림프종, 용혈)
#   WBC               | <2.0 ×10³/μL | >30.0 ×10³/μL| <2.0: 중증 백혈구감소 (감염 취약). >30: 백혈병·중증 감염
#   Hemoglobin        | <7.0 g/dL    | —            | 수혈 고려 기준 (TRICC trial: Hgb <7 → restrictive 수혈)
#   Platelet          | <50 ×10³/μL  | >1000 ×10³/μL| <50: 출혈 위험 증가. >1000: 혈전 위험
#   Hematocrit        | <25%         | >60%         | <25: 심한 빈혈. >60: 혈전/과점도
#   Glucose           | <50 mg/dL    | >400 mg/dL   | <50: 저혈당 (의식장애·경련). >400: 고삼투압·DKA
#   Potassium         | <3.0 mEq/L   | >6.0 mEq/L   | <3.0: 부정맥 위험. >6.0: 심정지 위험 (peaked T wave)
#   Sodium            | <120 mEq/L   | >155 mEq/L   | <120: 뇌부종·경련. >155: 고삼투압·의식장애
#   CRP               | —            | >100 mg/L    | 중증 세균감염, 패혈증, 또는 광범위 조직 괴사
#   hs-CRP            | —            | >10.0 mg/L   | hs-CRP >10은 급성 감염/염증 → 일반 CRP 영역으로 전환 해석
#   Ferritin          | —            | >1000 ng/mL  | Macrophage activation syndrome, HLH, Still's disease
#   BNP               | —            | >500 pg/mL   | 급성 심부전 가능성 높음 (ESC Heart Failure 2021)
#   NT-proBNP         | —            | >900 pg/mL   | 급성 심부전 가능성 높음 (연령 보정 필요)
#   hs-cTnT           | —            | >0.1 ng/mL   | 심근경색 가능성. Type II MI (PE, 패혈증에서도 상승)
#
# ───────────────────────────────────────────────────────────────
# [F7] medical_terms — 표준 의학 용어 표기 원칙
# ───────────────────────────────────────────────────────────────
#
# 검사값이 비정상일 때 사용하는 의학 용어는 다음 관례를 따른다.
# 사견을 배제하고 임상 교과서 및 국제 표준에 근거한다.
#
#   측정 대상             | 낮을 때            | 높을 때             | 근거
#   ────────────────────┼───────────────────┼────────────────────┼──────────
#   전해질 (Na, K, Ca,   | Hyponatremia 등   | Hypernatremia 등   | Tietz 7th
#   Mg, Phosphate)       | (Hypo- 접두어)     | (Hyper- 접두어)     | Ch.14-16
#   혈액가스 (pO2, pCO2) | Hypoxemia,        | Hyperoxemia,       | Tietz 7th
#                        | Hypocapnia        | Hypercapnia        | Ch.28
#   pH                   | Acidemia          | Alkalemia          | Harrison's
#   혈당                 | Hypoglycemia      | Hyperglycemia      | Tietz 7th
#   혈구세포 (WBC,       | Leukopenia,       | Leukocytosis,      | Tietz 7th
#   Plt, Hgb, Neut,      | Thrombocytopenia, | Thrombocytosis,    | Ch.31
#   Lymph, Eos)          | Anemia, ~penia    | ~cytosis/~philia   |
#   효소·단백 표지자      | Normal            | Elevated           | Tietz 7th
#   (CRP, LDH, BNP 등)  |                   |                    | Ch.16-19
#   시간 검사 (PT, INR)   | Normal            | Prolonged          | Tietz 7th
#                        |                   |                    | Ch.32
#   비율 지표 (NLR)       | Normal            | Elevated NLR       | —
#   항체/항원 검사        | Negative          | Positive           | —
#
#   "Decreased/Increased"는 medical_terms 필드에서 사용하지 않는다.
#   (임상 서술문 맥락에서만 사용)
#   [Tietz 7th Ed; Stedman's 28th Ed; Harrison's 21st Ed]
#
# ───────────────────────────────────────────────────────────────
# [F8] disease_associations — 질환 연관 패턴 읽는 법
# ───────────────────────────────────────────────────────────────
#
# 각 검사항목의 disease_associations는 해당 검사값이 특정 질환에서
# 어떤 패턴으로 나타나는지를 기술한다.
#
#   disease_key  : 질환 식별 키 (lung_disease_profiles_v2.yaml과 동일)
#   disease_kr   : 한국어 질병명
#   icd10_main   : 주요 ICD-10 코드 (YAML anchor 참조)
#   pattern      : 해당 질환에서 이 검사값이 보이는 전형적 패턴
#
# pattern에 사용되는 기호:
#   ↑    : 상승 경향
#   ↑↑   : 현저한 상승
#   ↓    : 감소 경향
#   ↓↓   : 현저한 감소
#   ↔    : 변화 없거나 양방향 가능
#   괄호 : 구체적 조건·설명
#   세미콜론(;) : 추가 맥락
#   [출처]: 각 패턴의 근거 문헌
#
# 예: Lactate의 ARDS 패턴
#   "↑↑ (조직 저관류 반영; Lactate ≥4 mmol/L → 패혈성 쇼크 정의)"
#   → ARDS에서 Lactate가 현저히 상승하며,
#     4 이상이면 패혈성 쇼크의 진단 기준에 해당한다.
#
# ───────────────────────────────────────────────────────────────
# [F9] LOINC 코드 및 NA 표기 항목
# ───────────────────────────────────────────────────────────────
#
# LOINC (Logical Observation Identifiers Names and Codes)은
# 검사와 관찰의 국제 표준 식별 코드이다 (loinc.org).
# 본 파일의 모든 항목에 LOINC 코드를 부여하였으며,
# 4개 항목은 "NA"로 표기하고 사유를 note에 기재하였다.
#
#   50826 (Tidal Volume) — 인공호흡기 설정 파라미터로 표준 검사 코드 미해당
#   51146 (Basophils %)  — MIMIC-IV 내부 매핑에 LOINC이 없음
#   51277 (RDW)          — MIMIC-IV 내부 매핑에 LOINC이 없음
#   EXT_AG (Gene Panel)  — 다중 유전자 패널은 개별 유전자 코드는 있으나
#                          패널 전체에 대한 단일 LOINC이 없음
#
# ───────────────────────────────────────────────────────────────
# [F10] ItemID 체계 — MIMIC-IV vs 외부검사
# ───────────────────────────────────────────────────────────────
#
# 본 파일의 89개 항목은 두 가지 ID 체계를 사용한다:
#
# (1) 숫자 ItemID (50xxx, 51xxx, 53xxx) — 53개 항목
#     MIMIC-IV labevents 테이블에 존재하는 검사.
#     d_labitems.csv에서 itemid로 조회하면 label, fluid, category를
#     확인할 수 있다.
#     labevents.csv에서 해당 itemid로 필터링하여 환자별 결과를 추출한다.
#
# (2) EXT_A ~ EXT_AJ — 36개 항목
#     MIMIC-IV에 포함되지 않은 외부 검사(external tests).
#     실제 임상에서 시행되지만 MIMIC-IV 데이터셋에는 수록되지 않은
#     전문 검사들이다 (자가항체, ILD 바이오마커, 종양표지자, 분자검사 등).
#     이 검사들의 결과는 사용자(임상의)가 직접 입력하거나
#     다른 데이터 소스에서 획득해야 한다.
#
# ───────────────────────────────────────────────────────────────
# [F11] Light Criteria — 흉수 삼출액/여출액 감별
# ───────────────────────────────────────────────────────────────
#
# 본 파일의 K 카테고리 (Pleural Fluid Analysis) 항목들과
# C/D 카테고리의 일부 항목이 Light criteria에 관여한다.
#
# Light criteria: 다음 중 하나라도 충족하면 삼출액(exudate)
#   1. 흉수 Total Protein / 혈청 Total Protein > 0.5
#   2. 흉수 LDH / 혈청 LDH > 0.6
#   3. 흉수 LDH > 혈청 상한 정상치의 2/3 (≈200 U/L)
#
# 추가 감별 지표:
#   흉수 ADA ≥ 40 U/L → 결핵성 흉막염
#   흉수 pH < 7.20    → 복잡성 부폐렴 흉수 → 배액 필요
#   흉수 Glucose < 60 mg/dL → 감염·류마티스·악성 흉수
#
# 주의: Light criteria는 삼출액에 대한 sensitivity ~98%이지만,
# 이뇨제 사용 환자에서 여출액을 삼출액으로 오분류할 수 있다 (specificity ~80%).
# 이 경우 혈청-흉수 albumin gradient (>1.2 g/dL이면 여출액)로 보정한다.
# [Light RW. NEJM 2002;346(25):1971-1977;
#  Porcel et al. Am J Med 2014;127(11):1118-1125]
#
# ───────────────────────────────────────────────────────────────
# [F12] J_Infection_Microbiology — 미생물 검사 10개 항목 상세
# ───────────────────────────────────────────────────────────────
#
# 본 파일의 J 카테고리는 감염 원인체를 직접 검출하거나 면역 반응을
# 측정하는 미생물 관련 검사 10개를 수록한다.
# microbiologyevents.csv는 사용하지 않으며, 이 항목들의 reference와
# 환자 입력 데이터 매칭으로 미생물 소견을 평가한다.
#
# (1) Blood Culture (EXT_I)
#     혈액에서 세균/진균을 직접 배양하는 검사.
#     결과: Positive(균혈증/진균혈증) / Negative
#     채혈 원칙: 항생제 투여 전, 2세트 이상(호기+혐기), 서로 다른 부위.
#     ICU 입원 폐렴에서는 필수 검사이다.
#     양성률: CAP ~10-20%, HAP/VAP ~15-25% (균혈증 동반 시)
#     오염(contamination): coagulase-negative Staphylococcus가
#       1세트에서만 양성이면 오염 가능성이 높다.
#     [ATS/IDSA CAP 2019; Surviving Sepsis 2021; CLSI M47-A2]
#
# (2) Sputum Culture / Gram Stain (EXT_AE)
#     객담에서 원인균을 그람 염색 및 배양으로 동정하는 검사.
#     결과: 원인균 이름 (Pathogen ID)
#     객담 품질 기준 (Murray & Washington):
#       WBC >25/LPF, Epithelial cells <10/LPF → 적합 검체
#       상피세포 과다 → 구강 오염, 재채취 필요
#     주요 소견과 의미:
#       그람양성 쌍구균(diplococci) → S. pneumoniae
#       그람음성 간균(bacilli)     → H. influenzae, Klebsiella
#       그람양성 포도상 구균       → S. aureus
#     정량 배양: HAP/VAP에서 ≥10⁵ CFU/mL이면 진정한 감염으로 판정.
#     [ATS/IDSA CAP 2019; Murray & Washington sputum criteria]
#
# (3) AFB Smear / Culture (EXT_B)
#     결핵균(Mycobacterium tuberculosis) 및 비결핵 항산균(NTM) 검출.
#     항산균 도말(Ziehl-Neelsen or Auramine):
#       Sensitivity: 50-80% (균 수 ≥5,000-10,000/mL에서 양성)
#       결과: 도말 양성(1+ ~ 4+) / 음성
#     배양 (Gold Standard):
#       고체 배지(Löwenstein-Jensen): 2-8주 소요
#       액체 배지(BACTEC MGIT 960): 1-3주, 더 빠르고 sensitivity 높음
#     배양 양성 → 활동성 결핵 확진
#     NTM 감별: 배양 후 균종 동정 필요 (PCR 또는 생화학 검사)
#     [WHO TB Diagnosis 2022; ATS/IDSA/CDC TB Treatment 2016]
#
# (4) TB-PCR — Xpert MTB/RIF (EXT_AF)
#     결핵균 DNA를 실시간 PCR로 검출하는 신속 분자검사.
#     결과: Detected / Not detected (+ 리팜피신 내성 여부)
#     소요 시간: 약 2시간 (도말/배양 대비 획기적으로 빠름)
#     Sensitivity:
#       도말 양성 검체: ~99%
#       도말 음성 검체: ~67% (도말 음성 결핵을 잡아내는 핵심 장점)
#     리팜피신 내성 동시 검출: rpoB 유전자 돌연변이 확인
#       → MDR-TB 조기 진단 가능
#     Xpert MTB/RIF Ultra: 차세대 버전, sensitivity 더 향상 (도말음성에서 ~90%)
#     [WHO Xpert MTB/RIF 2013; Steingart et al. Cochrane 2014]
#
# (5) IGRA — QFT-GIT / T-SPOT.TB (EXT_O)
#     결핵균 특이 항원에 대한 T세포 면역 반응을 측정하는 혈액 검사.
#     결과: Positive / Negative / Indeterminate
#     원리:
#       QFT-GIT: 결핵균 항원(ESAT-6, CFP-10, TB7.7) 자극 후
#         interferon-gamma 분비량을 ELISA로 측정
#       T-SPOT.TB: 동일 항원 자극 후 IFN-γ 분비 T세포 수를
#         ELISPOT으로 계수
#     핵심 특징:
#       BCG 접종의 영향을 받지 않는다 (TST와의 결정적 차이)
#       활동성 결핵과 잠복 결핵을 구별할 수 없다
#         → 양성이면 흉부 영상 + 임상 소견으로 활동성 여부 판단
#       면역저하 환자에서 Indeterminate(판정불능) 가능
#     [Pai et al. NEJM 2016;375:740-753; CDC/ATS IGRA Guidelines 2017]
#
# (6) Aspergillus Galactomannan (EXT_N)
#     Aspergillus 세포벽의 galactomannan 항원을 검출하는 검사.
#     결과: Index 값 (연속 수치)
#     Threshold:
#       혈청 index ≥ 0.5 → 양성
#       BAL index ≥ 1.0  → 양성 (BAL이 혈청보다 sensitivity 높음)
#     임상적 의미:
#       침습성 폐 아스페르길루스증(IPA) 조기 진단의 핵심 검사
#       면역저하 환자(호중구감소증, 이식, 장기 스테로이드)에서 유용
#       면역정상 환자에서는 sensitivity 낮음 (~30%)
#     위양성 원인:
#       Piperacillin-tazobactam (Penicillium-유래 성분)
#       Histoplasma, Fusarium 교차반응
#       일부 곡물 식품 섭취
#     연속 모니터링(serial GM)으로 치료 반응 평가 가능.
#     [Patterson et al. IDSA Aspergillosis 2016;
#      Maertens et al. Clin Infect Dis 2009]
#
# (7) Beta-D-Glucan (EXT_H)
#     대부분의 진균 세포벽에 존재하는 (1→3)-β-D-Glucan을 검출.
#     결과: pg/mL (연속 수치)
#     범위: 정상 0~60 pg/mL
#     Threshold:
#       ≥80 pg/mL  → 양성 (침습성 진균감염 의심)
#       >300 pg/mL → PCP(Pneumocystis jirovecii 폐렴) 강력 시사
#     특징:
#       범진균 검사(panfungal): Candida, Aspergillus, Pneumocystis,
#         Fusarium, Trichosporon 등 대부분의 진균에서 양성
#       PCP 진단에서 sensitivity >90% — PCP의 우수한 선별 검사
#     검출 불가 진균 (BDG를 생성하지 않음):
#       Mucor/Rhizopus (접합균증)
#       Cryptococcus (협막으로 차폐)
#       → 이 진균 감염에서는 위음성이다
#     위양성 원인:
#       혈액투석 (셀룰로오스 막)
#       알부민/면역글로불린 정맥 수혈
#       거즈 수술 물품 (β-glucan 함유)
#       세균혈증 (일부 그람양성균)
#     [Fungitell assay; Tasaka et al. Chest 2007;131(4):1173-1180;
#      Onishi et al. J Clin Microbiol 2012]
#
# (8) SARS-CoV-2 RT-PCR (53185)
#     SARS-CoV-2 RNA를 역전사 실시간 중합효소연쇄반응으로 검출.
#     결과: Detected / Not detected
#     WHO/CDC가 인정하는 COVID-19 확진 표준검사(gold standard).
#     검체: 비인두(NP) 스왑이 sensitivity 최적.
#       타액, 전비공(anterior nares) 검체는 sensitivity 다소 낮음.
#     Sensitivity: 증상 발현 후 1-3일에 최고 (~95%)
#     Ct value (Cycle threshold):
#       PCR 과정에서 양성 신호가 처음 검출되는 사이클 수.
#       Ct < 25: 높은 바이러스 부하 (전파력 높음)
#       Ct 25-30: 중간 바이러스 부하
#       Ct > 30: 낮은 바이러스 부하 (감염 초기/회복기)
#       주의: Ct value는 기관·키트·검체 간 표준화되지 않아
#         절대값으로 기관 간 비교할 수 없다.
#     [WHO COVID-19 Diagnostic Testing 2020;
#      Corman et al. Euro Surveill 2020;25(3):2000045]
#
# (9) Rapid SARS-CoV-2 PCR (53186)
#     신속 분자검사 — 소형 PCR 장비에서 15-45분 내 결과.
#     결과: Detected / Not detected
#     대표 플랫폼:
#       Cepheid Xpert Xpress (~45분)
#       Abbott ID NOW (~15분, 등온증폭)
#     Sensitivity: standard RT-PCR 대비 다소 낮음 (~85-95%)
#       특히 Abbott ID NOW는 낮은 바이러스 부하에서 위음성 가능.
#     용도: 응급 상황, 수술 전 선별, 격리 결정이 급한 경우.
#     음성이나 임상적 의심이 높으면 standard RT-PCR로 재검 권고.
#     [FDA EUA; WHO Rapid Diagnostics 2021]
#
# (10) SARS-CoV-2 Rapid Antigen Test (EXT_AH)
#     SARS-CoV-2 핵캡시드(N) 단백질을 면역크로마토그래피로 검출.
#     결과: Positive / Negative
#     소요 시간: 15-30분 (Point-of-care)
#     Sensitivity:
#       증상 발현 전후(바이러스 부하 높은 시기): 80-90%
#       무증상/회복기(바이러스 부하 낮은 시기): 40-60%
#       → PCR 대비 sensitivity가 낮아, 음성이라도
#         임상적 의심 시 PCR 확인이 필요하다.
#     Specificity: >97% (위양성은 드묾)
#     Omicron 변이에서 일부 키트의 sensitivity 저하가 보고되었다.
#     WHO 권고: RT-PCR 접근이 어려운 환경이나 신속 선별에 사용.
#       양성이면 추정 진단으로 격리·치료 시작.
#     [WHO Interim Guidance on Ag-RDTs 2021;
#      Dinnes et al. Cochrane Database Syst Rev 2021]
#
