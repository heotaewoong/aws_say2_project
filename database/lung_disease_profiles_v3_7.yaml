    dyspnea: HP:0002094
    wheezing: HP:0002099
    chest tightness: HP:0001082
    fatigue: HP:0012378
  lab_patterns:
  - Leukocytosis
  - Elevated CRP (inflammation)
  - Hypercapnia (respiratory acidosis)
  - Hypoxemia
  radiology_findings:
  - peribronchial thickening
  - hyperinflation
  - tram-track sign
  - bronchial wall thickening
  micro_findings:
  - Haemophilus influenzae
  - Streptococcus pneumoniae
  - Moraxella catarrhalis
  references:
  - GOLD 2024 Report (Global Initiative for Chronic Obstructive Lung Disease)
  - Harrison's 21st Ch.293
  - '[v6+ 가중치 조정 2026-04-20] v6+: PFT(FEV1)/SpO2 L에 포함 → L 0.15→0.25 상향, S 0.40→0.30
    하향'
