    icd10_main:
    - C34.0
    - C34.1
    - C34.9
    pattern: ↑ (NLR ≥5 → NSCLC 불량 예후; 전체 생존/무진행 생존과 역상관; 면역항암제 반응 예측 보조) [Cedrés et
      al. Lung Cancer 2012; Mezquita et al. JAMA Oncol 2018]
  - disease_key: community_acquired_pneumonia
    disease_kr: 지역사회획득 폐렴 (CAP)
    icd10_main:
    - J13
    - J14
    - J15
    - J18
    pattern: ↑ (중증 폐렴에서 상승; 패혈증 동반 시 NLR ≥10) [de Jager et al. Crit Care 2010]
  - disease_key: ards
