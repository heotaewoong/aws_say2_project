# CheXpert 14 Label → DB Imaging Token Expansion Reference (v1.6)
# ═══════════════════════════════════════════════════════════════════════════════
#
# ▣ 약어·용어 풀이 (GLOSSARY) — 본 헤더에 등장하는 모든 약어·전문 용어
# ───────────────────────────────────────────────────────────────────────────────
# 본 문서는 의료·AI·학술 도메인이 결합되어 약어가 많다. 모두 풀어서 설명한다.
#
# ▶ 핵심 시스템 용어
#   • SSOT  (Single Source of Truth, 단일 진실 출처)
#           — 하나의 사실(정보·정의·매핑)에 대해 신뢰할 수 있는 *유일한* 원천
#             문서. 여러 곳에 같은 정보를 복사하면 한쪽이 수정될 때 다른 쪽이
#             낡아져 모순이 생기므로, "딱 한 곳에만 진실을 두고 나머지는 거기
#             서 읽어 간다" 는 소프트웨어·데이터 관리 원칙. 본 YAML 이 바로
#             CheXpert 14 라벨 ↔ DB 토큰 매핑의 SSOT 다 — 다른 코드·문서는
#             이 파일을 *읽기만* 하고 매핑을 자체 정의하지 않는다.
#   • YAML  (YAML Ain't Markup Language, 사람이 읽기 쉬운 데이터 형식)
#           — JSON 처럼 데이터를 표현하되 들여쓰기 + 콜론으로 작성해서 사람이
#             읽고 편집하기 쉬운 형식. 설정 파일·매핑 테이블에 흔히 사용.
#   • DB    (Database, 데이터베이스) — 본 문서에서는 lung_dx 의 질환 profile
#             YAML (lung_disease_profiles_v3_3.yaml) 을 의미. Phase 3 가
#             질환별 radiology_findings 토큰을 읽어 매칭한다.
#   • Phase 1 — lung_dx 5단계 중 첫 단계. "증상·문진" (symptom + history).
#             HPO 표준 vocabulary 사용. profile.hpo_phenotypes 와 매칭.
#   • Phase 2 — lung_dx 5단계 중 두 번째 단계. "X-ray AI 분석".
#             CheXpert 14 카테고리 label + 확률 (probability) 만 출력
#             (Option E). 본 어댑터의 입력 출처.
#   • Phase 3 — lung_dx 5단계 중 세 번째 단계. "Multimodal scoring"
#             (symptoms + x-ray + lab + micro 통합). S/L/R/M 4축
#             (Symptom/Lab/Radiology/Micro) 의 가중 합산으로 질환 ranking.
#             본 어댑터의 출력 소비처.
#   • Phase 4 — lung_dx 5단계 중 네 번째 단계. "LLM re-ranking".
#             Bedrock Sonnet + Guard Rail 6종으로 Phase 3 ranking + Phase 1·2·3
#             value (symptom HPO / X-ray 14cat / lab / micro) 를 LLM 정답지와
#             대조하여 재 ranking. **Phase 5 결과는 입력 아님**.
#   • Phase 5 — lung_dx 5단계 중 다섯 번째 단계. "Rare disease".
#             **별도 팀 담당** — Phase 3·4 와 엄격 분리. Phase 1·2·3 의 4
#             modality value 를 받아 LIRICAL Bayesian LR + RRF 4-ranker fusion
#             으로 희귀질환 평가. Phase 4 거치지 않는 독립 트랙. 결과는 Final
#             단계로 직접 전달.
#   • R축    — Phase 3 의 4축 중 Radiology(영상) 축. 본 YAML 의 expansion
#             토큰이 질환 profile 의 radiology_findings 와 매칭되는 곳.
#   • Option E — Phase 2 가 CheXpert 14 라벨만 출력 (HPO 변환 거부) 하는 설계
#             결정. 2026-05-14 owner 의학 판단으로 채택.
#
# ▶ 의학·영상의학 용어
#   • CheXpert — Stanford 가 2019 년 발표한 흉부 X-ray AI 라벨 데이터셋.
#             보고서에서 14개 항목(observation) 을 자동 추출해 라벨링.
#             arXiv:1901.07031 (CheXpert 원전 논문).
#   • CR/DX  (Computed Radiography / Digital Radiography, 디지털 흉부 X-ray)
#           — 필름 대신 디지털 센서로 촬영한 일반 X-ray. 본 YAML 의 적용
#             대상. 단면 영상인 CT 나 자기공명영상인 MRI 는 적용 대상 아님.
#   • CT    (Computed Tomography, 컴퓨터 단층촬영) — X-ray 를 여러 각도에서
#             촬영해 단면 영상으로 재구성. 본 YAML 적용 범위 밖.
#   • MRI   (Magnetic Resonance Imaging, 자기공명영상) — 자석으로 인체
#             단면을 촬영. 본 YAML 적용 범위 밖.
#   • Fleischner Society — 흉부 영상의학 국제 학회. 흉부 영상 용어의 국제
#             표준(Glossary) 을 발표한다. 가장 최신 판이 2024 년 Bankier
#             et al. (PMID 38411514) Glossary.
#   • descriptor (서술자) — Fleischner 2024 가 정의하는 분류. *영상에서
#             직접 보이는 비특이적 관찰* (예: consolidation, opacity).
#             "진단을 함의하는 용어 (terms that imply a radiologic
#             diagnosis)" 와 명시적으로 분리.
#   • observation (관찰 라벨) — CheXpert 가 14 라벨에 부여한 명칭. 영상
#             소견 + 임상 진단명이 혼재한 라벨 카테고리.
#   • HPO   (Human Phenotype Ontology, 인간 표현형 온톨로지) — 의학 증상·
#             징후를 표준 코드로 정리한 국제 vocabulary. 본 YAML 은 HPO
#             변환을 거부 (Option E) 하며, lung_dx 의 Phase 1(증상)과
#             Phase 5(희귀질환)에서만 HPO 사용.
#   • CAP   (Community-Acquired Pneumonia, 지역사회 획득 폐렴) — 병원 밖
#             에서 감염된 폐렴. R3 가 ATS/IDSA 의 CAP 진료 지침.
#   • ATS   (American Thoracic Society, 미국 흉부학회)
#   • IDSA  (Infectious Diseases Society of America, 미국 감염병학회)
#   • ALI/ARDS — Acute Lung Injury / Acute Respiratory Distress Syndrome
#             (급성 폐손상 / 급성 호흡곤란 증후군). R4 가 다루는 질환.
#   • CPE   (Cardiogenic Pulmonary Edema, 심인성 폐부종) — 심장 기능 저하
#             로 폐에 체액이 차는 상태. R4 가 ALI/ARDS 와 CPE 의 영상
#             감별에 관한 systematic review.
#   • BTS   (British Thoracic Society, 영국 흉부학회) — R7 의 발행 기관.
#   • ACR   (American College of Radiology, 미국 영상의학회) — R8 의 발행
#             기관. "Appropriateness Criteria" 는 영상 검사 권고 지침.
#   • PA projection (Posteroanterior, 후전방 촬영) — X-ray 를 환자 뒤에서
#             앞으로 통과시켜 촬영. 표준 흉부 X-ray 자세.
#   • supine AP — Supine(누운 자세) + AP(Anteroposterior, 전후방 촬영).
#             환자가 누운 상태에서 X-ray 를 앞에서 뒤로 통과시킴 (보통
#             중환자실 침상 촬영).
#
# ▶ 학술·문헌 식별 용어
#   • PMID  (PubMed Identifier, 펍메드 식별 번호) — 미국 NLM 의 PubMed
#             데이터베이스가 의학 논문에 부여하는 고유 번호.
#             예: PMID 38411514 → Fleischner 2024 Glossary.
#   • PMC   (PubMed Central, 펍메드 센트럴) — PubMed 의 무료 전문(full text)
#             아카이브. 예: PMC10902601 → Fleischner 2024 전문 HTML.
#   • arXiv — 코넬 대학교가 운영하는 무료 학술 논문 사전공개 서버.
#             AI/CS 분야 논문은 정식 학술지 발표 전 arXiv 에 올라가는
#             경우가 많다. 예: arXiv:1901.07031 → CheXpert 원전.
#   • AAAI  (Association for the Advancement of Artificial Intelligence,
#             국제 AI 학회) — CheXpert 가 발표된 학술 회의.
#   • DOI   (Digital Object Identifier, 디지털 객체 식별자) — 학술 자료의
#             영구 식별 URL. (본 YAML 에서는 PMID 우선 사용)
#   • SR    (Systematic Review, 체계적 문헌 고찰) — 특정 임상 질문에 대해
#             기존 연구를 체계적으로 검색·평가·종합하는 연구 방법.
#             가장 높은 근거 수준 중 하나. R4 Komiya 2017 이 SR.
#   • PubMed esearch — NLM 이 제공하는 PubMed 검색 API. 본 YAML 에서
#             "peer-reviewed crosswalk 0건" 같은 negative evidence 확인
#             에 사용.
#   • verbatim (축자 인용) — 원문 그대로(글자 한 자도 안 바꾸고) 인용한
#             것. paraphrase(의역) 의 반대. 본 YAML 의 [V] 마커가 이를
#             강제한다.
#   • paraphrase (의역) — 원문 의미는 유지하되 표현은 바꿔서 다시 쓴
#             것. verbatim 아님. [V] 로 라벨링하면 안 되며 적발 시 [F].
#   • fabrication (조작) — 원문에 없는 내용을 있다고 주장하는 것. 의도
#             여부와 무관하게 [F] 적발 대상.
#   • hallucination (환각) — AI 가 사실이 아닌 내용을 마치 사실처럼
#             생성하는 현상. fabrication 의 AI 맥락 용어.
#   • peer-reviewed (동료 심사) — 같은 분야 전문가들이 학술적으로 검증한.
#             peer-reviewed crosswalk = 동료 심사 거친 매핑표.
#   • crosswalk (대응표 / 매핑표) — 두 개 이상의 표준 vocabulary 간
#             1:1 또는 1:N 매핑 테이블. 예: ICD-10 ↔ SNOMED CT crosswalk.
#             본 YAML 자체가 CheXpert ↔ Fleischner 의 *비공식* crosswalk.
#   • granularity (입자도 / 세분화 수준) — 정보의 잘게 쪼개진 정도.
#             CheXpert "Pneumonia" 는 굵은 입자도(진단명 수준),
#             Fleischner "consolidation" 은 가는 입자도(소견 수준).
#   • institutional convention (기관 내부 관례) — 학술 표준이 아직 없을
#             때 한 기관(여기선 lung_dx 팀) 내부에서 정한 잠정 규칙.
#             외부 권위가 아닌 내부 합의에 근거함을 정직 공시해야 함.
#
# ▶ AI 모델·데이터 용어
#   • NLP   (Natural Language Processing, 자연어 처리) — 컴퓨터가 사람의
#             글을 이해·처리하는 AI 기술. CheXpert 가 영상 자체가 아니라
#             "방사선 보고서 텍스트" 에서 14 라벨을 NLP 룰로 추출.
#   • LLM   (Large Language Model, 대규모 언어 모델) — GPT/Claude/Gemini
#             같은 거대 언어 AI. lung_dx 의 Phase 4 verifier 에서 사용.
#   • label noise (라벨 잡음) — 학습 데이터의 라벨이 부정확한 경우. CheXpert
#             원전이 Pneumonia 라벨에 대해 인정한 한계.
#   • probability (확률) — AI 모델이 "이 라벨이 맞을 확률" 로 출력하는
#             0~1 범위의 값. detection_threshold(기본 0.5) 이상이면
#             detected_findings 에 포함.
#   • expansion (확장) — 본 YAML 의 핵심 동작. 단일 CheXpert 라벨을
#             여러 DB 토큰 set 으로 펼치는 것. 예: "Pneumonia" → 6 토큰.
#   • canonical_db_token (정규 DB 토큰) — 14 라벨 각각의 대표 토큰 1개.
#             expansion 토큰 set 의 첫 번째 원소이자 가장 표준적인 명칭.
#
# ▣ 파일 역할 (FILE ROLE)
# ───────────────────────────────────────────────────────────────────────────────
# 본 YAML 은 lung_dx 진단 시스템의 **Phase 2 ↔ Phase 3 어댑터 매핑 SSOT**
# (Single Source of Truth, 단일 진실 출처) 이다.
#
#   [Phase 2 출력]                  [본 YAML 어댑터]                [Phase 3 입력]
#   ─────────────                   ────────────────                ─────────────
#   X-ray AI 모델             →    14 라벨 → DB 토큰 매핑     →    질환 profile
#   (CheXpert 14 카테고리                                            radiology_findings
#    label + probability)                                            매칭 (R축 scoring)
#
# 왜 필요한가:
#   ① CheXpert 14 라벨은 영상의학 vocabulary 와 다른 입자도(granularity)를 가짐
#      • CheXpert "Pneumonia" = 임상 진단명 (clinical diagnosis)
#        - arXiv 1901.07031 verbatim: "Pneumonia, despite being a clinical
#          diagnosis, was included as a label" (CheXpert 원저자가 인정)
#      • profile DB radiology_findings = Fleischner 표준 descriptor
#        - 예: "consolidation", "air bronchogram", "ground glass" 등
#        - Fleischner 2024 verbatim: "Some terms are labeled as descriptors
#          to differentiate them from terms that imply a radiologic diagnosis"
#   ② 두 vocabulary 의 입자도 차이를 매개할 peer-reviewed crosswalk 부재
#      (PubMed esearch 6 query → 0건)
#   ③ 따라서 lung_dx 내부 institutional convention 으로 매핑을 정의·문서화하고,
#      각 매핑 토큰에 학술 evidence 를 token-level marker 로 부착해야 함.
#
# 본 파일의 책임 범위:
#   ✓ 14 라벨 각각의 canonical_db_token + expansion 토큰 set 정의
#   ✓ 각 expansion 토큰별 학술 evidence 부착 ([V]/[P]/[F] 마커)
#   ✓ Phase 3 어댑터 설정 (detection_threshold, possible_threshold, exclude_labels)
#   ✓ honesty_disclosure — 매핑의 한계·1차 출처 부재·임상 통용 토큰 정직 공시
#   ✗ HPO 변환 (Option E — Phase 1 증상·Phase 5 희귀질환에만 HPO 사용)
#   ✗ CT/MRI (chest X-ray CR/DX only)
#
# 본 파일의 소비자:
#   • lung_dx/phase3_multimodal/chexpert_adapter.py
#     - ChexpertReferenceLoader (싱글톤 캐시) → version/labels/expansion 로딩
#     - build_phase1_result() → 14 라벨 입력을 ai_keywords_matched 토큰 set
#       으로 변환, Phase 3 diagnostic_scorer._calc_radiology_ratio 에 전달
#
# ▣ Evidence 마커 체계 ([V] / [P] / [F]) — token-level audit framework
# ───────────────────────────────────────────────────────────────────────────────
# 본 YAML 의 모든 evidence 항목은 다음 3종 마커 중 하나로 시작한다.
# 마커는 학술 인용의 **재현 가능한 검증 상태(verification state)** 를 표시한다.
#
# ┌──────┬────────────────┬───────────────────────────────────────────────────┐
# │ 마커 │ 의미           │ 정의                                              │
# ├──────┼────────────────┼───────────────────────────────────────────────────┤
# │ [V]  │ verbatim       │ 인용한 표현이 출처 본문에 글자 그대로(verbatim)   │
# │      │ 본문 확인      │ 존재함을 raw text grep 으로 확인. 인용문 원문     │
# │      │                │ (translation 아닌 origin) 첨부.                   │
# │      │                │ 예: PMC HTML grep / arXiv PDF pdftotext grep      │
# ├──────┼────────────────┼───────────────────────────────────────────────────┤
# │ [P]  │ verbatim       │ 인용 의도는 정당하나 본 시점에 verbatim 확인      │
# │      │ pending        │ 불가. 사유 명시 (paywall, textbook 미접근,        │
# │      │                │ 부분 일치 등). next_steps 에 검증 계획 기재.      │
# │      │                │ → "있다고 단정하지 않음" (보수적 보류).            │
# ├──────┼────────────────┼───────────────────────────────────────────────────┤
# │ [F]  │ fact 위반      │ 인용 시도했으나 본문에 부재 — 잘못된 인용 적발.   │
# │      │ 적발·정정      │ attribute 제거 / 다운그레이드 / 토큰 보존 여부    │
# │      │                │ 를 사유와 함께 기록. 누적 [F] 건수는 학술 정직성  │
# │      │                │ 지표.                                             │
# └──────┴────────────────┴───────────────────────────────────────────────────┘
#
# 왜 이 마커 체계가 필요한가:
#   ① 단순 references 부착은 audit 시 "원문이 정말 그렇게 말했는가?" 검증 불가
#      → 토큰 단위 marker 부착으로 누구나 grep 한 줄로 재현·반박 가능
#   ② AI 의학 시스템에서 fabrication/hallucination 적발은 단언적 [V] 와
#      유보적 [P] 의 구분이 사전 차단 → 잘못된 [V] 표기 자체가 [F] 로 적발됨
#   ③ 의학 reference 의 paraphrase ≠ verbatim ≠ fabrication 의 3-tier 구분이
#      학술 책임성(scholarly accountability)을 코드 레벨로 강제
#   ④ 누적 [F] 건수는 시스템 초기 라벨링 신뢰도의 정량 지표가 됨
#      (v1 → v1.3 누적 fact 위반 9건 적발 = 학술 audit 의 가시성 확보 증거)
#
# 마커 사용 의사결정 흐름:
#
#   주장(claim) → 출처 paper 본문 raw text grep
#       ↓
#   본문에 verbatim 존재?
#       ├── YES                  → [V] + verbatim 원문(translation 아님) 첨부
