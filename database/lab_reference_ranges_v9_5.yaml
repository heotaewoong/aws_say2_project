220277:
  name: SpO2 (Pulse Oximetry)
  name_kr: 산소포화도 (맥박산소측정)
  unit: '%'
  category: A_Vital_Signs
  ref_source: GOLD 2026; GINA 2024; BTS Oxygen Guideline 2017; Matthay Global ARDS
    Definition (AJRCCM 2024;209:37-47)
  ranges:
    lower: 95
    upper: 100
  thresholds:
  - name: borderline_hypoxemia
    criterion: ≤94
    source: BTS Oxygen Guideline 2017
    note: 산소 보충 고려 시작
  - name: abg_recommended_copd
    criterion: ≤92
    source: GOLD 2026
    note: ABG 시행 권고
  - name: life_threatening_asthma
    criterion: <90
    source: GINA 2024
    note: 생명위협 천식
  - name: severe_asthma_exacerbation
    criterion: <92
    source: GINA 2024
    note: 중증 천식 악화
  - name: ltot_indication_copd
    criterion: ≤88
    source: GOLD 2026; ATS/ERS
    note: 장기 산소요법(LTOT) 적응증
  - name: severe_hypoxemia
    criterion: <85
    source: Harrison's 21st
    note: 즉각적 개입 필요
  - name: target_general
    criterion: 94–98
    source: BTS Oxygen Guideline 2017
    note: 일반 환자 목표 범위
  - name: target_copd_co2_risk
    criterion: 88–92
    source: BTS Oxygen Guideline 2017
    note: CO2 축적 위험 환자 목표 범위
  - name: ards_spo2_fio2_ratio
    criterion: SpO2/FiO2 ≤ 315 when SpO2 ≤ 97%
    source: Matthay et al. Global ARDS Definition 2024 (AJRCCM)
    note: Berlin PaO2/FiO2 대체 가능; 자원 제한 환경·HFNC 환자에서 ARDS 진단 가능
  - name: ards_sf_ratio_nonintubated
    criterion: SpO2/FiO2≤315_when_SpO2≤97
    source: Matthay MA et al. A New Global Definition of ARDS. AJRCCM 2024;209(1):37-47.
      DOI 10.1164/rccm.202303-0558WS. PMID 37487152
    note: 비삽관 환자 ARDS 진단 — SpO2 ≤97%일 때 SpO2/FiO2 ≤315, HFNC ≥30 L/min 또는 NIV PEEP
      ≥5 병행 시 적용
  medical_terms:
    low: Hypoxemia (desaturation)
    critical_low: Severe Hypoxemia (immediate intervention required)
  scoring_systems:
    NEWS2:
      ≤91: 3
      92–93: 2
      94–95: 1
      ≥96: 0
    NEWS2_Scale2_COPD:
      ≤83: 3
      84–85: 2
      86–87: 1
      88–92: 0
      93–94: 1
      95–96: 2
      ≥97: 3
    PESI:
      <90: +20점
  disease_associations:
  - disease_key: community_acquired_pneumonia
    disease_kr: 지역사회획득 폐렴 (CAP)
    icd10_main:
    - J13
    - J14
    - J15
    - J18
    pattern: '↓ (≤94%: 중증 지표) [ATS CAP 2025]'
  - disease_key: copd_exacerbation
    disease_kr: COPD 급성 악화
    icd10_main:
    - J44.0
    - J44.1
    pattern: ↓ (≤88% → LTOT 적응; ≤92% → ABG 필요) [GOLD 2026]
  - disease_key: asthma_exacerbation
    disease_kr: 천식 급성 악화
    icd10_main:
    - J45
    - J46
    pattern: ↓ (<92% → 중증; <90% → 생명위협) [GINA 2025 Strategy Report]
  - disease_key: pulmonary_embolism
    disease_kr: 폐색전증
    icd10_main:
    - I26.0
    - I26.09
    - I26.90
    - I26.99
    pattern: ↓ (급성 V/Q mismatch) [ESC PE 2019 / AHA 2026 PE]
  - disease_key: ards
    disease_kr: 급성호흡곤란증후군 (ARDS)
    icd10_main:
    - J80
    pattern: ↓↓ (SpO2/FiO2 비율로 중증도 대체 평가) [Matthay Global ARDS Definition 2024 (AJRCCM
      209:37-47)]
  - disease_key: pneumothorax
    disease_kr: 기흉
    icd10_main:
    - J93.0
    - J93.1
    - J93.9
    pattern: ↓ (긴장성 기흉 시 급격 하강) [BTS Pleural 2023]
  - disease_key: interstitial_lung_disease
    disease_kr: 간질성 폐질환 / 폐섬유화증
    icd10_main:
    - J84.1
    - J84.9
    pattern: ↓ (운동 시 desaturation이 초기 징후) [ATS/ERS/JRS/ALAT IPF 2022 Update]
  - disease_key: aspiration_pneumonia
    disease_kr: 흡인성 폐렴
    icd10_main:
    - J69.0
    pattern: ↓ (흡인 범위에 따라 다양; 대량 흡인 시 급격 저하) [ATS CAP 2025]
  - disease_key: lung_cancer
    disease_kr: 폐암
    icd10_main:
    - C34.0
    - C34.1
    - C34.2
    - C34.3
    - C34.8
    - C34.9
    pattern: ↓ (기도 폐쇄, 흉수, 림프관성 전이 시; 초기에는 정상) [NCCN NSCLC v5.2026]
  - disease_key: sarcoidosis
    disease_kr: 사르코이드증
    icd10_main:
    - D86.0
    - D86.1
    - D86.2
    - D86.9
    pattern: ↓ (Stage III-IV 진행 시; 운동 시 desaturation) [ATS/ERS Sarcoidosis 2020 (유효)]
  - disease_key: bronchiectasis
    disease_kr: 기관지확장증
    icd10_main:
    - J47.0
    - J47.1
    - J47.9
    pattern: ↓ (감염 악화 시 저하; 만성 colonization 환자에서 기저치 낮음) [ERS Bronchiectasis 2025
      Update]
  - disease_key: acute_respiratory_failure
    disease_kr: 급성 호흡부전
    icd10_main:
    - J96.0
    - J96.9
    pattern: '↓↓ (Type 1: PaO2 <60mmHg; SpO2 급격 저하가 주 소견) [Harrison''s 22nd Ch.318]'
  - disease_key: chronic_respiratory_failure
    disease_kr: 만성 호흡부전
    icd10_main:
    - J96.1
    pattern: ↓ (만성적 저하; LTOT 적용 환자에서 ≤88%) [Harrison's 22nd Ch.318]
  - disease_key: viral_pneumonia
    disease_kr: 바이러스 폐렴
    icd10_main:
    - J12
    - J12.8
    - J12.9
    pattern: ↓ (양측 GGO 시 현저; COVID-19에서 silent hypoxia 보고) [ATS CAP 2025]
  - disease_key: influenza_pneumonia
    disease_kr: 인플루엔자
    icd10_main:
    - J10
    - J10.0
    - J10.1
    pattern: ↓ (2차 세균 감염 동반 시 급격 악화) [ATS CAP 2025]
  - disease_key: empyema
    disease_kr: 농흉
    icd10_main:
    - J86
    - J86.0
    - J86.9
    pattern: ↓ (흉수에 의한 폐 압박; 패혈증 동반 시 저하) [BTS Pleural 2023]
  - disease_key: atelectasis
    disease_kr: 무기폐 (폐허탈)
    icd10_main:
    - J98.1
    pattern: ↓ (폐엽 이상 범위 시 유의; 수술 후 흔한 원인) [GOLD 2026]
  - disease_key: emphysema
    disease_kr: 폐기종
    icd10_main:
    - J43
    - J43.0
    - J43.1
    - J43.9
    pattern: ↓ (만성적 가스교환 장애; COPD와 유사) [GOLD 2026]
  - disease_key: sleep_apnea
    disease_kr: 수면무호흡
    icd10_main:
    - G47.3
    - G47.30
    - G47.33
    pattern: ↓ (간헐적 야간 desaturation; ODI ≥5 진단 기준 보조) [AASM OSA 2025 Update]
  - disease_key: hypersensitivity_pneumonitis
    disease_kr: 과민성 폐렴
    icd10_main:
    - J67
    - J67.9
    pattern: ↓ (급성 노출 후 일시적 저하; 만성형에서 지속적) [GOLD 2026]
  - disease_key: pneumoconiosis
    disease_kr: 진폐증
    icd10_main:
    - J62
    - J62.8
    pattern: ↓ (진행성 massive fibrosis 시 점진적 저하) [GOLD 2026]
  - disease_key: pulmonary_eosinophilia
    disease_kr: 폐 호산구증가증
    icd10_main:
    - J82
    pattern: ↓ (광범위 침윤 시; 경증은 정상 유지) [GOLD 2026]
  - disease_key: influenza
    pattern: ↓ (pneumonia 합병 시 desaturation; CDC Influenza 2023) [IDSA Influenza 2018
      (Uyeki)]
  - disease_key: acute_bronchiolitis
    pattern: ↓ (영아 SpO2 <90% → 입원 기준; AAP 2014) [GOLD 2026]
  - disease_key: chemical_pneumonitis
    pattern: ↓ (흡입 손상 정도에 따라 가변; ATS Drug Toxicity) [ESC ACS 2023]
  - disease_key: postprocedural_respiratory_disorder
    pattern: ↓ (post-op atelectasis/PTX; ATS/IDSA HAP 2016) [GOLD 2026]
  - disease_key: acute_upper_respiratory_infection
    pattern: 정상 (URI는 일반적으로 SpO2 보존) [GOLD 2026]
  - disease_key: neonatal_respiratory_disorder
    pattern: ↓ (RDS/BPD; targeted SpO2 90–95%; AAP NRP 2020) [GOLD 2026]
  - disease_key: congenital_respiratory_anomaly
    pattern: ↓ (구조적 폐 이상에 따라 가변; Bush A 2018) [GOLD 2026]
  - disease_key: thoracic_skeletal_deformity
    pattern: ↓ (제한성 폐기능; Koumbourlis 2009) [ESC ACS 2023]
  - disease_key: cerebrovascular_disease_aspiration_risk
    pattern: ↓ (흡인성 폐렴 합병 시; Marik PE NEJM 2001) [GOLD 2026]
  - disease_key: pneumonia_other_organisms
    pattern: ↓ (CAP과 동일 패턴) [ATS CAP 2025]
  derived_indicators:
  - name: SpO2/FiO2 ratio (S/F ratio)
    description: ARDS 중증도 비침습적 대체 지표
    source: Rice et al. Crit Care Med 2007
    formula: SpO2 / FiO2
    thresholds:
      mild: ≤315
      moderate: ≤235
      severe: ≤148
  hpo_terms:
    low: HP:0012418
    critical_low: HP:0002878
    _note: 'critical_low: SpO2 ≤88% LTOT 적응증 (GOLD 2026); SpO2 <85% severe — 호흡부전
      정의 (Roussos ERJ 2003 PMID 14621112)'
  measurement_context:
    environment: bedside_noninvasive_monitoring
    specimen: null
    notes: Pulse oximetry; finger/earlobe sensor. Accuracy affected by peripheral
      perfusion, nail polish, skin pigmentation.
  latest_verified_date: '2026-04-20'
220045:
  name: Heart Rate
  name_kr: 심박수
  unit: bpm
  category: A_Vital_Signs
  ref_source: Harrison's 21st/22nd (2026) Ch.238; PESI (Aujesky 2005); NEWS2 (RCP
    2017)
  ranges:
    lower: 60
    upper: 100
  thresholds:
  - name: tachycardia
    criterion: ≥100
    source: Harrison's 21st Ed
    note: 빈맥 정의
  - name: wells_pe_criterion
    criterion: '>100'
    source: Wells et al. Ann Intern Med 2001
    note: Wells PE Score +1.5점
  - name: pesi_risk_factor
    criterion: ≥110
    source: Aujesky et al. Am J Med 2005 (PESI)
    note: PESI +20점
  - name: severe_tachycardia
    criterion: ≥130
    source: Harrison's 21st Ed
    note: 혈역학적 불안정 우려
  - name: life_threatening_asthma_bradycardia
    criterion: <60
    source: GINA 2024
    note: 천식에서 서맥 = 불량 예후 징후
  - name: severe_bradycardia
    criterion: ≤40
    source: NEWS2 (RCP 2017)
    note: NEWS2 3점
  medical_terms:
    low: Bradycardia
    high: Tachycardia
    critical_low: Severe Bradycardia
    critical_high: Severe Tachycardia (hemodynamic compromise)
  scoring_systems:
    NEWS2:
      ≤40: 3
      41–50: 1
      51–90: 0
      91–110: 1
      111–130: 2
      ≥131: 3
    PESI:
      ≥110: +20점
    Wells_PE:
      '>100': +1.5점
  disease_associations:
  - disease_key: pulmonary_embolism
    disease_kr: 폐색전증
    icd10_main:
    - I26.0
    - I26.09
    - I26.90
    - I26.99
    pattern: ↑ (PE의 가장 흔한 활력징후 이상; Wells Score 구성) [ESC PE 2019 / AHA 2026 PE]
  - disease_key: community_acquired_pneumonia
    disease_kr: 지역사회획득 폐렴 (CAP)
    icd10_main:
    - J13
    - J14
    - J15
    - J18
    pattern: ↑ (발열, 저산소에 의한 보상성 빈맥) [ATS CAP 2025]
  - disease_key: pneumothorax
    disease_kr: 기흉
    icd10_main:
    - J93.0
    - J93.1
    - J93.9
    pattern: '↑ (긴장성 기흉: 빈맥 + 저혈압) [BTS Pleural 2023]'
  - disease_key: asthma_exacerbation
    disease_kr: 천식 급성 악화
    icd10_main:
    - J45
    - J46
    pattern: ↑ (≥120 → 중증; paradoxical bradycardia는 불량 징후) [GINA 2025 Strategy Report]
  - disease_key: pulmonary_hypertension
    disease_kr: 폐동맥 고혈압
    icd10_main:
    - I27.0
    - I27.20
    - I27.21
    - I27.29
    pattern: ↑ (우심 부전 보상; 부정맥 동반 가능) [Harrison's 21st/22nd (2026) Ch.238]
  - disease_key: pulmonary_edema
    disease_kr: 폐부종 / 심부전
    icd10_main:
    - J81.0
    - J81.1
    - I50.1
    pattern: ↑ (심부전 보상) [Harrison's 21st/22nd (2026) Ch.238]
  - disease_key: aspiration_pneumonia
    disease_kr: 흡인성 폐렴
    icd10_main:
    - J69.0
    pattern: ↑ (발열, 저산소에 의한 보상; 패혈증 동반 시 ≥100) [ATS CAP 2025]
  - disease_key: lung_cancer
    disease_kr: 폐암
    icd10_main:
    - C34.0
    - C34.1
    - C34.2
    - C34.3
    - C34.8
    - C34.9
    pattern: ↑ (SVC 증후군, 흉수, 빈혈에 의한 보상성 빈맥) [NCCN NSCLC v5.2026]
  - disease_key: sarcoidosis
    disease_kr: 사르코이드증
    icd10_main:
    - D86.0
    - D86.1
    - D86.2
    - D86.9
    pattern: ↑ (드물게 심장 사르코이드증 시 부정맥/전도 장애) [ATS/ERS Sarcoidosis 2020 (유효)]
  - disease_key: bronchiectasis
    disease_kr: 기관지확장증
    icd10_main:
    - J47.0
    - J47.1
    - J47.9
    pattern: ↑ (감염 악화 시; 만성 환자에서 기저치 상승 가능) [ERS Bronchiectasis 2025 Update]
  - disease_key: acute_respiratory_failure
    disease_kr: 급성 호흡부전
    icd10_main:
    - J96.0
    - J96.9
    pattern: ↑ (저산소 보상; ≥120 → 중증) [Harrison's 22nd Ch.318]
  - disease_key: viral_pneumonia
    disease_kr: 바이러스 폐렴
    icd10_main:
    - J12
    - J12.8
    - J12.9
    pattern: ↑ (발열에 비례; COVID-19에서 상대적 서맥 보고됨) [ATS CAP 2025]
  - disease_key: influenza_pneumonia
    disease_kr: 인플루엔자
    icd10_main:
    - J10
    - J10.0
    - J10.1
    pattern: ↑ (고열에 의한 빈맥; 심근염 합병 시 부정맥) [ATS CAP 2025]
  - disease_key: empyema
    disease_kr: 농흉
    icd10_main:
    - J86
    - J86.0
    - J86.9
    pattern: ↑ (패혈증/발열에 의한 지속적 빈맥) [BTS Pleural 2023]
  - disease_key: sleep_apnea
    disease_kr: 수면무호흡
    icd10_main:
    - G47.3
    - G47.30
    - G47.33
    pattern: 가변적 (무호흡 중 서맥 → 각성 시 빈맥; 야간 부정맥) [AASM OSA 2025 Update]
  - disease_key: pulmonary_eosinophilia
    disease_kr: 폐 호산구증가증
    icd10_main:
    - J82
    pattern: 경미 ↑ (중증 기관지 수축 시) [Harrison's 21st/22nd (2026) Ch.238]
  - disease_key: influenza
    pattern: ↑ (febrile 빈맥; +10 bpm/°C 상승) [IDSA Influenza 2018 (Uyeki)]
  - disease_key: emphysema
    pattern: ↑ (만성; cor pulmonale 시 더욱; GOLD 2026) [GOLD 2026]
  - disease_key: pulmonary_valve_disorder
    pattern: ↑ (보상성; ESC Valvular 2021) [Harrison's 21st/22nd (2026) Ch.238]
  - disease_key: postprocedural_respiratory_disorder
    pattern: ↑ (post-op pain/hypovolemia/감염) [Harrison's 21st/22nd (2026) Ch.238]
  - disease_key: cerebrovascular_disease_aspiration_risk
    pattern: 변동 (뇌간 손상 시 ↓ 가능; AHA Stroke 2019) [Harrison's 21st/22nd (2026) Ch.238]
  - disease_key: thoracic_aortic_disease
    pattern: ↑ (rupture 시 shock; ESC 2024) [Harrison's 21st/22nd (2026) Ch.238]
  - disease_key: neonatal_respiratory_disorder
    pattern: ↑ (정상 신생아 100–160; AAP NRP 2020) [Harrison's 21st/22nd (2026) Ch.238]
  hpo_terms:
    low: HP:0001662
    high: HP:0001649
    critical_low: HP:0001662
    critical_high: HP:0001649
    _note: 'critical_low: HPO에 severe bradycardia 별도 ID 없음 — 동일 HP 유지, severity 필드로
      구분; critical_high: HPO에 severe tachycardia 별도 ID 없음 — severity 필드로 구분'
  measurement_context:
    environment: bedside_noninvasive_monitoring
    specimen: null
    notes: ECG lead or plethysmography-derived heart rate.
  latest_verified_date: '2026-04-17'
220050:
  name: Arterial Blood Pressure systolic
  name_kr: 동맥 수축기 혈압 (침습적)
  unit: mmHg
  category: A_Vital_Signs
  ref_source: Harrison's 21st/22nd (2026) Ch.271; Surviving Sepsis Campaign 2021/2026;
    PESI
  ranges:
    lower: 90
    upper: 140
  thresholds:
  - name: qsofa_criterion
    criterion: ≤100
    source: Seymour et al. JAMA 2016 (qSOFA)
    note: '패혈증 선별: qSOFA 1점'
  - name: pesi_risk_factor
    criterion: <100
    source: Aujesky et al. Am J Med 2005 (PESI)
    note: PESI +30점
  - name: septic_shock
    criterion: <90
    source: Surviving Sepsis Campaign 2021
    note: 패혈성 쇼크 (적절한 수액 소생 후에도 지속)
  - name: massive_pe
    criterion: <90
    source: ESC PE Guidelines 2019
    note: 대량 PE / hemodynamic instability
  - name: hypertensive_crisis
    criterion: ≥180
    source: AHA/ACC 2017
    note: 고혈압 위기
  medical_terms:
    low: Hypotension
    high: Hypertension
    critical_low: Severe Hypotension (shock)
  scoring_systems:
    NEWS2:
      ≤90: 3
      91–100: 2
      101–110: 1
      111–219: 0
      ≥220: 3
    PESI:
      <100: +30점
    qSOFA:
      ≤100: 1
  disease_associations:
  - disease_key: community_acquired_pneumonia
    disease_kr: 지역사회획득 폐렴 (CAP)
    icd10_main:
    - J13
    - J14
    - J15
    - J18
    pattern: ↓ (<90 → 패혈성 쇼크; 중증 폐렴 major criteria) [ATS CAP 2025]
  - disease_key: pulmonary_embolism
    disease_kr: 폐색전증
    icd10_main:
    - I26.0
    - I26.09
    - I26.90
    - I26.99
