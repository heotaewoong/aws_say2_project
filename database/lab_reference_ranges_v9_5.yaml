  - disease_key: cerebrovascular_disease_aspiration_risk
    disease_kr: 흡인 위험 뇌혈관 질환
    pattern: ↓ (bulbar dysfunction) [ATS/ERS 2002 Respiratory Muscle Testing]
  hpo_terms:
    low: HP:0002098
  latest_verified_date: '2026-04-16'
EXT_PFT11:
  name: Bronchodilator Reversibility (post-BD FEV1 change)
  name_kr: 기관지확장제 가역성
  unit: '% change in FEV1'
  category: R_Pulmonary_Function_Test
  ref_source: ATS/ERS 2022 Interpretation (Stanojevic S et al. Eur Respir J. 2022;60:2101499);
    GINA 2025 Strategy Report; ATS/ERS 2019 Spirometry
  ranges:
    lower: 0
    upper: 12
  thresholds:
  - name: significant_reversibility_atsers_2022
    criterion: ≥10% change in FEV1 or FVC (% predicted)
    source: ATS/ERS 2022
  - name: significant_reversibility_gina_classic
    criterion: ≥12% AND ≥200 mL increase from baseline
    source: GINA 2024; ATS/ERS 2005
  medical_terms:
    high: Significant bronchodilator reversibility (asthma likely)
  loinc: 33452-4
  mimic_iv_itemid: null
  mimic_iv_available: false
  measurement_context:
    environment: pulmonary_function_test
    specimen: null
    subtype: spirometry_with_bronchodilator
    patient_state_required: baseline spirometry → 400 μg salbutamol via MDI + spacer
      → repeat spirometry at 15 min
    notes: 2022 ATS/ERS updated criterion uses % predicted change (≥10%) to avoid
      dependence on baseline. Classic GINA criterion (≥12% + ≥200 mL) still widely
      used. Asthma can have normal spirometry between attacks; methacholine challenge
      may be needed.
  lung_disease_diagnostic_value:
    primary_utility:
    - asthma_exacerbation
    diagnostic_weight_hint: high
    cutoffs_for_dx:
    - disease_key: asthma_exacerbation
      threshold: 'ATS/ERS 2022: ≥10% pred change; GINA 2024: ≥12% + ≥200 mL'
      source: ATS/ERS 2022; GINA 2024
  disease_associations:
  - disease_key: asthma_exacerbation
    disease_kr: 천식 급성 악화
    icd10_main:
    - J45
    - J45.0
    - J45.20
    - J45.21
    - J45.22
    - J45.901
    - J46
    pattern: ↑ (≥12% + ≥200 mL → 가역성 확인, 천식 진단 지지) [GINA 2024]
  - disease_key: copd_exacerbation
    disease_kr: COPD 급성 악화
    icd10_main:
    - J44.0
    - J44.1
    - J44.9
    pattern: 일부 가역성 가능 (ACO asthma-COPD overlap) [GOLD 2026]
  hpo_terms:
    high: HP:0001738
  latest_verified_date: '2026-04-16'
