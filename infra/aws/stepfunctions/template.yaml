AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  Rare-Link AI Step Functions — Phase 1-5 orchestration.
  FastAPI startExecution with {session_id, patient_id}.

Parameters:
  Stage:
    Type: String
    Default: dev
    AllowedValues: [dev, staging, prod]
  Phase2FunctionName:
    Type: String
    Default: say2-2team-phase2-vision
  Phase3FunctionName:
    Type: String
    Default: phase3-scorer-dev
  Phase4FunctionName:
    Type: String
    Default: phase4-verifier-dev
  RAGFunctionName:
    Type: String
    Default: phase5-rag-dev
  Phase5FunctionName:
    Type: String
    Default: phase5-lr-dev

Resources:
  # ── State Machine 실행 IAM Role ─────────────────────────────────
  RareLinkPipelineRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: {Service: states.amazonaws.com}
            Action: sts:AssumeRole
      Policies:
        - PolicyName: invoke-phase-lambdas
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - lambda:InvokeFunction
                Resource:
                  - !Sub arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:${Phase2FunctionName}
                  - !Sub arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:${Phase3FunctionName}
                  - !Sub arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:${Phase4FunctionName}
                  - !Sub arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:${RAGFunctionName}
                  - !Sub arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:${Phase5FunctionName}
        - PolicyName: cloudwatch-logs
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogDelivery
                  - logs:GetLogDelivery
                  - logs:UpdateLogDelivery
                  - logs:DeleteLogDelivery
                  - logs:ListLogDeliveries
                  - logs:PutResourcePolicy
                  - logs:DescribeResourcePolicies
                  - logs:DescribeLogGroups
                Resource: "*"
      Tags:
        - {Key: project, Value: pre-2-2team}

  # ── CloudWatch Log Group (state machine 실행 로그) ──────────────
  RareLinkPipelineLogs:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/vendedlogs/states/rare-link-pipeline-${Stage}
      RetentionInDays: 30

  # ── State Machine ──────────────────────────────────────────────
  RareLinkPipeline:
    Type: AWS::Serverless::StateMachine
    Properties:
      Name: !Sub rare-link-pipeline-${Stage}
      Type: STANDARD
      DefinitionUri: state_machine.asl.json
      Role: !GetAtt RareLinkPipelineRole.Arn
      Logging:
        Destinations:
          - CloudWatchLogsLogGroup:
              LogGroupArn: !GetAtt RareLinkPipelineLogs.Arn
        IncludeExecutionData: true
        Level: ALL
      Tags:
        project: pre-2-2team

Outputs:
  StateMachineArn:
    Description: ARN for FastAPI startExecution
    Value: !Ref RareLinkPipeline
    Export:
      Name: !Sub ${AWS::StackName}-StateMachineArn
  StateMachineName:
    Value: !Sub rare-link-pipeline-${Stage}
  RoleArn:
    Value: !GetAtt RareLinkPipelineRole.Arn
