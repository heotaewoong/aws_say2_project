    disease_kr: COVID-19 (SARS-CoV-2 감염)
    icd10_main:
    - U07.1
    - U07.2
    pattern: ↑ (NLR ≥3.13 → 중증 진행 예측 sensitivity 87.5%; ≥5 → ICU/사망 위험 증가; 입원 시 NLR은
      독립적 예후 인자) [Liu et al. J Transl Med 2020; Yang et al. Int J Infect Dis 2020]
